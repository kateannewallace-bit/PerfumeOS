<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Perfume OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   LA COLLECTION — Mobile-first CSS
   Breakpoints: default mobile < 640px → tablet 640-1024 → desktop > 1024
   ═══════════════════════════════════════════════════════════════════════════ */

:root {
  --bg: #faf9f7;
  --bg-card: #fff;
  --bg-soft: #f5f2ee;
  --fg: #1a1a1a;
  --fg-mute: #666;
  --fg-soft: #999;
  --fg-very-soft: #bbb;
  --border: #e8e4df;
  --border-soft: #f0ece8;
  --gold: #c8a97e;
  --sage: #8aaa80;
  --dusty-rose: #c87a7a;
  --lilac: #9b7db8;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: Georgia, 'Times New Roman', serif;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: var(--safe-bottom);
}

select, input, button, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
button { cursor: pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── NAV ─────────────────────────────────────────────────────────────────── */
.nav {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding-top: var(--safe-top);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 56px;
}
.logo {
  font-size: 14px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--fg);
}
.menu-btn {
  background: none;
  border: none;
  font-size: 24px;
  width: 44px;
  height: 44px;
  color: var(--fg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-links {
  display: none;
  flex-direction: column;
  border-top: 1px solid var(--border);
  background: var(--bg);
  max-height: calc(100vh - 56px);
  overflow-y: auto;
}
.nav-links.open {
  display: flex;
}
.nav-link {
  background: none;
  border: none;
  padding: 16px 20px;
  text-align: left;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-soft);
  border-bottom: 1px solid var(--border-soft);
  min-height: 48px;
}
.nav-link.active {
  color: var(--fg);
  background: var(--bg-soft);
  border-left: 3px solid var(--fg);
  padding-left: 17px;
}

/* Tablet+: horizontal nav */
@media (min-width: 640px) {
  .menu-btn { display: none; }
  .nav-links {
    display: flex !important;
    flex-direction: row;
    border-top: none;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 12px;
    gap: 4px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    max-height: none;
  }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-link {
    padding: 8px 14px;
    font-size: 11px;
    letter-spacing: 0.12em;
    border-bottom: none;
    border-left: none;
    min-height: 0;
    white-space: nowrap;
    position: relative;
  }
  .nav-link.active {
    background: transparent;
    border-left: none;
    padding-left: 14px;
  }
  .nav-link.active::after {
    content: "";
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: -1px;
    height: 1px;
    background: var(--fg);
  }
  .nav-inner {
    padding: 0 24px;
  }
}

/* ─── LAYOUT ──────────────────────────────────────────────────────────────── */
.main {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 20px 80px;
}
@media (min-width: 640px) { .main { padding: 32px 32px 80px; } }
@media (min-width: 1024px) { .main { padding: 40px 48px 80px; } }

.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--fg-soft);
  font-style: italic;
}

.page-title {
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin-bottom: 6px;
}
.page-sub {
  font-size: 14px;
  color: var(--fg-soft);
  font-style: italic;
  margin-bottom: 24px;
}
@media (min-width: 640px) {
  .page-title { font-size: 30px; margin-bottom: 6px; }
  .page-sub { margin-bottom: 32px; }
}

/* ─── BANNER ──────────────────────────────────────────────────────────────── */
.banner {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  padding: 14px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--fg-mute);
  line-height: 1.6;
}

/* ─── FILTERS ─────────────────────────────────────────────────────────────── */
.search-input {
  width: 100%;
  border: 1px solid #ddd;
  background: #fff;
  padding: 12px 16px;
  font-size: 15px;
  outline: none;
  margin-bottom: 12px;
  min-height: 44px;
}
.search-input:focus { border-color: var(--gold); }

.filter-toggle {
  width: 100%;
  background: #fff;
  border: 1px solid #ddd;
  padding: 12px 16px;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  min-height: 44px;
}
.filter-summary {
  font-size: 11px;
  color: var(--gold);
  text-transform: none;
  letter-spacing: 0;
  font-style: italic;
}

.filter-panel {
  display: none;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
}
.filter-panel.open { display: grid; }

.filter-panel label {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.filter-panel select, .filter-panel input {
  border: 1px solid #ddd;
  background: #fff;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  min-height: 44px;
}

@media (min-width: 640px) {
  .filter-toggle { display: none; }
  .filter-panel {
    display: grid !important;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 0;
    background: none;
    border: none;
    margin-bottom: 24px;
    align-items: end;
  }
  .filter-panel select, .filter-panel input {
    padding: 8px 12px;
    font-size: 13px;
    min-height: 38px;
  }
}

/* ─── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn-primary {
  background: var(--fg);
  color: #fff;
  border: none;
  padding: 12px 24px;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  min-height: 44px;
  white-space: nowrap;
}
.btn-ghost {
  background: transparent;
  color: var(--fg-mute);
  border: 1px solid #ddd;
  padding: 11px 22px;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  min-height: 44px;
  white-space: nowrap;
}
.toggle {
  border: 1px solid #ddd;
  background: #fff;
  color: var(--fg-mute);
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  min-height: 44px;
  white-space: nowrap;
}
.toggle.active {
  background: var(--fg);
  color: #fff;
  border-color: var(--fg);
}

/* ─── CHIPS ───────────────────────────────────────────────────────────────── */
.chip-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.chip-row.mode-row { margin-bottom: 28px; }
.chip {
  background: #fff;
  border: 1px solid var(--border);
  padding: 8px 14px;
  font-size: 13px;
  color: var(--fg-mute);
  font-style: italic;
  min-height: 36px;
  border-radius: 0;
}
.chip.active {
  background: var(--fg);
  color: #fff;
  border-color: var(--fg);
  font-style: normal;
}

/* ─── GRID / CARDS ────────────────────────────────────────────────────────── */
.result-count {
  font-size: 13px;
  color: var(--fg-soft);
  margin-bottom: 14px;
}
.result-count .warn { color: var(--dusty-rose); }

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}
@media (min-width: 640px) {
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
}

.card {
  background: #fff;
  border: 1px solid var(--border);
  padding: 18px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.card:active, .card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
}

.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.card-title {
  flex: 1;
  min-width: 0;
}
.card-house {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-soft);
  margin-bottom: 3px;
}
.card-name {
  font-size: 16px;
  color: var(--fg);
  line-height: 1.3;
  margin-bottom: 2px;
  word-break: break-word;
}
.card-conc {
  font-size: 11px;
  color: var(--fg-very-soft);
  letter-spacing: 0.06em;
}
.card-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}
.card-rating { font-size: 12px; }

.card-annotation {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

.card-foot {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border-soft);
}
.mini-lbl {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-very-soft);
  margin-bottom: 2px;
}
.mini-val {
  font-size: 13px;
  color: var(--fg-mute);
}
.sim-badge, .trev-mark {
  margin-left: auto;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.sim-badge { color: var(--fg-soft); background: var(--bg-soft); padding: 3px 8px; }
.trev-mark { color: var(--sage); }

.wear-strip {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border-soft);
  font-size: 11px;
  color: var(--fg-soft);
  letter-spacing: 0.04em;
}

/* ─── TAGS ────────────────────────────────────────────────────────────────── */
.tag-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.tag-row.centered { justify-content: center; }
.tag {
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid;
  white-space: nowrap;
}

/* ─── MODAL ───────────────────────────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.modal {
  background: var(--bg);
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 28px 20px 40px;
  position: relative;
  border-radius: 12px 12px 0 0;
}
@media (min-width: 640px) {
  .overlay { align-items: center; padding: 20px; }
  .modal { max-height: 85vh; padding: 36px 32px; border-radius: 0; }
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 14px;
  background: none;
  border: none;
  font-size: 28px;
  color: var(--fg-soft);
  width: 44px;
  height: 44px;
}

.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 6px;
  padding-right: 30px;
}
.modal-title {
  font-size: 22px;
  font-weight: 400;
  margin-top: 4px;
  word-break: break-word;
}
.modal-rating {
  text-align: right;
  flex-shrink: 0;
}
.rating-big {
  font-size: 22px;
  line-height: 1;
}
.rating-of {
  font-size: 12px;
  color: var(--fg-very-soft);
}
.status-line {
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: flex-end;
  margin-top: 4px;
  font-size: 11px;
  color: var(--fg-soft);
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

.scores-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
@media (min-width: 480px) { .scores-grid { grid-template-columns: repeat(4, 1fr); } }

.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--fg-mute);
}

.sec-lbl {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-soft);
  margin-bottom: 4px;
  display: inline-block;
}

.bar {
  display: flex;
  align-items: center;
  gap: 6px;
}
.bar-track {
  flex: 1;
  height: 2px;
  background: var(--border-soft);
  position: relative;
}
.bar-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
}
.bar-val {
  font-size: 11px;
  color: var(--fg-soft);
  min-width: 14px;
  text-align: right;
}

.notes-body {
  font-size: 13px;
  color: var(--fg-mute);
  line-height: 1.7;
  margin-bottom: 14px;
}
.my-notes {
  font-size: 13px;
  line-height: 1.75;
  color: var(--fg-mute);
  font-style: italic;
  background: var(--bg-soft);
  padding: 13px 16px;
  border-left: 2px solid var(--gold);
  margin: 10px 0;
}
.wear-box {
  background: var(--bg-soft);
  padding: 10px 13px;
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--fg-mute);
}
.rating-evo { display: flex; flex-wrap: wrap; gap: 6px; align-items: baseline; }
.rating-evo strong { margin-right: 4px; }
.evo-pill {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  font-size: 11px;
  color: var(--fg);
}
.evo-pill .evo-date { color: var(--fg-soft); margin-left: 4px; font-size: 10px; }
.evo-delta { margin-left: auto; font-weight: 600; font-size: 12px; }
.evo-delta.up { color: var(--sage); }
.evo-delta.down { color: var(--dusty-rose); }

/* ─── FORMS ───────────────────────────────────────────────────────────────── */
.form-card {
  background: #fff;
  border: 1px solid var(--border);
  padding: 22px 20px;
  margin-bottom: 24px;
}
.form-title {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  color: var(--fg-soft);
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
@media (min-width: 640px) {
  .form-grid { grid-template-columns: 1fr 1fr; }
  .form-grid .full-span { grid-column: 1 / -1; }
}
.form-grid label {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-grid input, .form-grid textarea {
  border: 1px solid #ddd;
  background: #fff;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  min-height: 44px;
  width: 100%;
}
.form-grid textarea {
  min-height: 80px;
  resize: vertical;
  font-family: inherit;
}
.form-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.full-label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 16px;
}
.full-select, .mono-input {
  border: 1px solid #ddd;
  background: #fff;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  min-height: 44px;
  width: 100%;
}
.mono-input { font-family: monospace; font-size: 12px; }

/* ─── ASK VIEW ────────────────────────────────────────────────────────────── */
.ask-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.ask-input-row .search-input { flex: 1; margin-bottom: 0; }

.examples {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  padding: 14px 16px;
  margin-bottom: 24px;
}
.examples .mini-lbl {
  margin-bottom: 8px;
}
.examples .chip-row { margin-bottom: 0; }

.error {
  color: var(--dusty-rose);
  font-size: 14px;
  padding: 12px;
  background: #fdf0f0;
  border: 1px solid #f5d6d6;
  margin-bottom: 20px;
}
.empty { color: var(--fg-very-soft); font-style: italic; padding: 20px 0; }

/* ─── SURPRISE ────────────────────────────────────────────────────────────── */
.surprise-card {
  text-align: center;
  padding: 32px 20px;
  background: #fff;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.surprise-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}
.surprise-house {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-soft);
  margin-bottom: 6px;
}
.surprise-name {
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 8px;
  line-height: 1.2;
}
.surprise-conc {
  font-size: 13px;
  color: var(--fg-soft);
  letter-spacing: 0.1em;
  margin-bottom: 14px;
}
.surprise-quote {
  font-size: 13px;
  color: var(--fg-mute);
  font-style: italic;
  max-width: 440px;
  margin: 18px auto;
  line-height: 1.7;
}
.surprise-rating {
  font-size: 22px;
  margin-top: 16px;
}
.surprise-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
@media (min-width: 640px) {
  .surprise-card { padding: 44px 32px; }
  .surprise-name { font-size: 36px; }
}

/* ─── TAXONOMY ────────────────────────────────────────────────────────────── */
.tab-scroll {
  display: flex;
  overflow-x: auto;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  -webkit-overflow-scrolling: touch;
}
.tab-scroll::-webkit-scrollbar { display: none; }
.tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 14px;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-soft);
  white-space: nowrap;
  min-height: 44px;
}
.tab.active {
  border-bottom-color: var(--fg);
  color: var(--fg);
}

.inline-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.inline-row select {
  border: 1px solid #ddd;
  background: #fff;
  padding: 8px 12px;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  min-height: 40px;
}
.count-muted { font-size: 12px; color: var(--fg-very-soft); }

/* ─── SIMILARITY ──────────────────────────────────────────────────────────── */
.ref-card {
  background: #fff;
  border: 1px solid var(--border);
  padding: 16px 18px;
  margin-bottom: 24px;
}
.ref-name {
  font-size: 16px;
  margin: 4px 0 8px;
}
.ref-meta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--fg-soft);
}

/* ─── DIARY ───────────────────────────────────────────────────────────────── */
.diary-controls {
  display: flex;
  gap: 8px;

"],"ss":6,"is":3,"bs":8,"ts":5,"m":"Classic","no":"Rose; Pink pepper; Angelica seed; Musk; Cashmeran","g":"unisex"},{"i":575,"h":"Zeromolecule","n":"Violamore","f":"floral, gourmand","r":null,"t":false,"pr":"Unrated","st":"Unrated","tg":["blackberry raspberry","caramel","floral","gourmand","licorice","violet"],"pm":["blackberry raspberry","floral","gourmand","licorice","violet"],"ss":5,"is":3,"bs":7,"ts":3,"m":"Classic","no":"Blackberry/raspberry; violet; licorice; caramel","g":"unisex"}],"wearLog":[{"date":"2025-11-14","perfume":"The Favourite","house":"Penhaligon's","perfumeId":458,"rating":9,"notes":"The favourite: 9/10 bubble bath and violet, really lovely drydown"},{"date":"2025-11-15","perfume":"The Bewitching Yasmine","house":"Penhaligon's","perfumeId":463,"rating":8,"notes":"Yasmine: 8/10 crazy coffee and pastry opening, very oud middle, really nice eastern incense drydown. A tolerable vanilla note- was very surprised when I first sprayed in a good way."},{"date":"2025-11-16","perfume":"Lunamaris","house":"Diptyque","perfumeId":145,"rating":8,"notes":"Luna: 8/10 floral pine forest, citrus zest, not at all sweet, just fresh. Pine goes away after opening and then it’s just very floral. Super short lived, really lovely"},{"date":"2025-11-17","perfume":"Empressa","house":"Penhaligon's","perfumeId":465,"rating":5,"notes":"Empressa 5/10 Big fruity opening, like melon and peach in a fruit salad in a department store. A little creamy vanilla but not cloying (actually maybe a bit cloying). Not my favorite opening (that’s Yasmine, wow) getting a caramel note as it dries, this might be the most gourmand one they make. Getting a lot more rose and patchouli as it dries. By the end of the day it’s really mellow and almost chocolate-y, after about 5-6 hours of wear and then it’s gone. But wow it is LOUD at first. 7/10 for dry down."},{"date":"2025-11-18","perfume":"Duchess Rose","house":"Penhaligon's","perfumeId":467,"rating":7,"notes":"Duchess Rose: super light, literal rose water or candied rose, but also a bit of skin scent at opening. (Ambroxan?). Very very light and inoffensive- I did several sprays. Really pleasant and safe. 7/10"},{"date":"2025-11-19","perfume":"Changing Constance","house":"Penhaligon's","perfumeId":466,"rating":7,"notes":"Changing Constance: caramel and vanilla, not too sweet or cloying but we shall see if Trevor is horrified. Tobacco in the background of the opening- maybe a unisex vanilla- I liked this but it was the same all day and didn’t last long. I didn’t ask Trevor to smell this one, but I’d wear it again. 7/10","safeReaction":"very negative"},{"date":"2025-11-20","perfume":"Halfeti","house":"Penhaligon's","perfumeId":468,"rating":4,"notes":"Halfeti- sprayed from far away since we didn’t like this in store. Opens spicy, woody and incense-y. Oud in the middle because it smells a bit like band aids. Not bad but very middle eastern and not at all floral- just warm spice. Very unisex. Dry down is dusty vanilla, pipe smoke, spices (cardamom?) mild headache a few hours in. 4/10 (note: stuck around on my jacket for a few days and is such a warm, creamy, comforting smell- maybe this is 7/10 and needs another wear)"},{"date":"2025-11-21","perfume":"Highgrove Bouquet","house":"Penhaligon's","perfumeId":473,"rating":6,"notes":"highgrove bouquet: floral with the same bubble bath note as diptique violette or the favourite- is it mimosa? Sweet floral with some photorealistic notes, pleasant and powdery. Trevor says old lady. 6/10, sophisticated","safeReaction":"mentioned"},{"date":"2025-11-22","perfume":"Wild Bluebell","house":"Jo Malone","perfumeId":305,"rating":5,"notes":"bluebell-sweet floral and HONEY. Lasts for about 30 seconds. Jo Malone is maybe a better bluebell. 5/10 for poor longevity."},{"date":"2025-11-23","perfume":"A Kiss of Bliss","house":"Penhaligon's","perfumeId":461,"rating":8,"notes":"a kiss of bliss- big sweet matcha opening drying down to a white musk- love this one. 8/10, a more complex Juliette has a gun with a green tea note. Trevor says “classic”","safeReaction":"mentioned"},{"date":"2025-11-24","perfume":"Solaris","house":"Penhaligon's","perfumeId":460,"rating":7,"notes":"Solaris- hi I’m on vacation. It’s plumeria and sharp citrus zest and tuberose. Smells like the beach. I like this but it’s for summer. 7/10 in the fall, 9/10 if you are outside and hot and sweaty. Zero longevity- I really oversprayed and it was gone so soon."},{"date":"2025-11-24","perfume":"Colette","house":"Tocca","perfumeId":535,"notes":"tocca Colette- musky, powdery, white floral in the musky drydown. inoffensive, not memorable, very safe and nice."},{"date":"2025-11-25","perfume":"Cairo","house":"Penhaligon's","perfumeId":462,"notes":"Cairo- spicy medicinal opening, middle smells like paramount imports- patchouli and incense. Mellow dry down, a little masculine. Fresh like dryer sheets somehow, though. Resinous. Bandage-y, medicinal oud. Good entry level middle eastern scent. Lighter and prettier than halfeti. Wore Yasmine in the evening, was too vanilla but I like it, was trying to smell enticing."},{"date":"2025-11-26","perfume":"Duchess Rose","house":"Penhaligon's","perfumeId":467,"notes":"liquid love. Trevor does not like it, I have a headache. It’s not bad, it’s interestingly spicy. Probably not a repeat. Dries down to a bland rose smell. Better ways to wear rose notes for sure. Duchess rose is better.","safeReaction":"mentioned","fuzzy":true},{"date":"2025-11-27","perfume":"Bianca","house":"Tocca","perfumeId":536,"notes":"tocca Bianca- fresh citrus with a tea note- a little cleansery and sharp, which is welcome. Sort of like eau sezane. Byredo gypsy water- woody and citrus- lemon, reminds me a lot of Gaiac 10 and tam dao."},{"date":"2025-12-01","perfume":"Mojave Ghost","house":"Byredo","perfumeId":44,"rating":6,"notes":"Byredo Mojave ghost: a woody, fruity, rose with a light pear note? (It’s sapodilla fruit!) Generally light and pleasant. pepper? By 4 pm I can still smell it- Clean and sort of fruity but not sweet. Not offensive but not spectacular. 6/10"},{"date":"2025-12-02","perfume":"Constantinople","house":"Penhaligon's","perfumeId":470,"notes":"Constantinople- vanilla, oud, resinous and mildly spicy. Same genre as Cairo, halfeti and Yasmine. I like it."},{"date":"2025-12-03","perfume":"Another 13","house":"Le Labo","perfumeId":348,"rating":1,"notes":"le labo another 13- smells like saliva, chewed spearmint gum, and pickles. No thank you. I’ll try again when I don’t have a cold. 1/10 (apparently these need to age? I’ll try again in a month or try at Nordstrom) Baie 19: sprayed so beautifully, like patchouli and wet soil, then quickly dried down to a gasoline on wet dirt smell. I guess that’s the petrichor smell but I don’t know if I can handle it. Smells like an army surplus store. I’ll give it 30 minutes. After 30 minutes, this has dried down to patchouli and evergreens with a light freshness. The ozone is still there but it’s not as heavy. Drydown is fresh and masculine. This one is a ride. Now it’s a light floral? At the end of the day it smells like dirty wet sand at the beach. Super complicated and weird, would wear again. 7/10 because it’s weird, but amazing."},{"date":"2025-12-04","perfume":"Aldehyde 44","house":"Le Labo","perfumeId":332,"rating":9,"notes":"Aldehyde 44- super clean, dryer sheets. Maybe a little old fashioned perfume, but very fresh, like soap. Whatever makes the favourite smell like bubble bath is in this. Dries down to a musky, creamy, non-sweet vanilla, which is perfect. This is what I wanted another 13 to be. A favorite, 9/10. Very faint by the afternoon, so no all-day longevity. Would buy this in full size, I think."},{"date":"2025-12-05","perfume":"Citron 28","house":"Le Labo","perfumeId":341,"rating":6,"notes":"citron 28: opens with tuberose and gardenia, jasmine maybe?getting very little citrus, maybe a little soap. Sweet lemon but no tang or sharpness. Dries down into straight, flat, sweet, light lemon. 6/10, nice but faint"},{"date":"2025-12-06","perfume":"Rain","house":"Clean Reserve","perfumeId":95,"rating":7,"notes":"clean reserve Rain. Super fresh, white floral and aquatic notes. Smells like a good laundry room or very fresh, sweet rain. A bit like baie 19 in the drydown. By midday, the drydown reminds me a lot of Halfeti, which must be the patchouli. 7/10 it’s good."},{"date":"2025-12-07","perfume":"Bergamote 22","house":"Le Labo","perfumeId":344,"rating":5,"notes":"le labo bergamote 22: Trevor said hm interesting which seems bad, but this a white floral citrus that is pretty average and inoffensive. Poor longevity. 5/10 unremarkable","safeReaction":"mentioned"},{"date":"2025-12-09","perfume":"Eucalyptus 20","house":"Le Labo","perfumeId":333,"rating":9,"notes":"eucalyptus 20: smoky wood- iconic smoky, with a sharp eucalyptus note. This one is woody, ozonic and masculine at the opening, but soft, without any rum or floral notes. It smells like extinguished coals. Medicinal oud and mellower in the drydown, then woody and smoky. This is feu de bois in a perfume. Then very mellow, fresh, cool like mint or camphor or a rounded eucalyptus. The Golden Gate Park of perfumes. Ends on a men’s deodorant note?! 9/10, loved this"},{"date":"2025-12-10","perfume":"Limette 37","house":"Le Labo","perfumeId":343,"rating":5,"notes":"limette 37- fresh squeezed lime and white floral- clean like the inside of a taqueria. Poor longevity. 5/10, not terrible. Later- Gucci alchemist’s garden Rosa Incandescente- an AMAZING marine rose that smelled like roses and the oceanic and dried down to a sweet, jammy rose. 10/10 a beauty. Le labo Violette 30- I think this is fake, it smells exactly like Another 13. Initial spray was straight PICKLES and then the chewed mint gum set in. Was expecting powdery violet. (Update! Not fake, amazing- just needs warmth to open up- might try the same with another 13 to see what happens. It might not be a scrubber after all.)"},{"date":"2025-12-11","perfume":"Neroli 36","house":"Le Labo","perfumeId":337,"notes":"neroli 36: a true neroli, faint sunscreen and orange blossom, maybe also a woody note? Then a watermelon/ light fruit note. Really beachy, good for summer. Maybe too light for winter."},{"date":"2025-12-13","perfume":"Violette 30","house":"Le Labo","perfumeId":346,"rating":10,"notes":"Violette 30. I love it so much. 10/10, buying this when it is released.","fuzzy":true},{"date":"2025-12-14","perfume":"1921","house":"Gucci","perfumeId":217,"notes":"Gucci 1921- beautiful chypre, citrus, neroli and oak moss. Not a ton of longevity, Trevor thinks it’s ok. Later, Byredo bibliotheque. Super rich, plummy opening that fades to a sweet leather. An unusual gourmand, I get no book note whatsoever. It’s nice but maybe not for me? Good winter/holiday scent. Good projection.","safeReaction":"mentioned"},{"date":"2025-12-15","perfume":"Muschio de luce","house":"Gucci","perfumeId":224,"rating":10,"notes":"Muschio di Luce- a light white musk with a fresh detergent quality- not floral, just clean. Later, woody and peppery. Almost vanilla-y in the dry down- a sweet white musk. 10/10 would buy.","fuzzy":true},{"date":"2025-12-16","perfume":"The virgin violet","house":"Gucci","perfumeId":213,"rating":10,"notes":"Gucci the virgin violet. Candied violets, bubble bath, like the favourite but more powdery? Instantly so beautiful on first spray, would buy based on this. We’ll see what the dry down does. 10/10 from the jump, a love. One hour in and the longevity is not great, though. Sweet sugar candy by 8 pm, 6 hours later. 9/10 Also tried it with the A kiss from violet perfume oil- same scent essentially."},{"date":"2025-12-17","perfume":"Animalique","house":"Byredo","perfumeId":37,"rating":8,"notes":"Byredo animalique: smoky ozonic opening, maybe woody, if the wood was burnt. Hint of violet or maybe a sugary grape candy. Series down to a pleasant, woody, powdery Violet. I really like this one. Fragrantica says powdery suede. Drydown after a few hours is a cozy vanilla suede, really soft. A big difference from first spray to dry down. 8/10"},{"date":"2025-12-18","perfume":"Tears of Iris","house":"Gucci","perfumeId":221,"rating":7,"notes":"Gucci Tears of Iris- this smells like sweet carrots. I’m getting nothing but carrots on initial spray. Sweet, earthy, root-y, violet-y Iris. Starts to get more powdery and violet-y and creamy as it dries, like old lipstick. Delicate and pretty. Maybe a little spice from the sandalwood in the dry down. This is also in the Lolita Lempicka neighborhood. Trevor says VERY old lady. “Smells like an old receptionist at a dentist office who LOVES wearing perfume” settled down to a sweet and quiet scent. 7/10 for me, 1/10 for Trevor","safeReaction":"mentioned"},{"date":"2025-12-19","perfume":"Coriandre 39","house":"Le Labo","perfumeId":340,"rating":6,"notes":"le labo coriandre 39. A blast of actually spicy coriander and fresh chopped cilantro leaves. Very green and spicy. Not sure if I hate this yet? It’s ok on the drydown- a fresh white floral, maybe a little aquatic or salty. Not sweet. A really fresh summer scent. Cinnamon?!? 6/10, weird but bearable"},{"date":"2025-12-20","perfume":"L’Eau Papier","house":"Diptyque","perfumeId":118,"rating":8,"notes":"diptyque l’eau papier. Like glossier you but more mature, and sweeter. Clean laundry. Fresh rice. Sprayed at 8:30 and sprayed again at noon. Some pepper in the opening? 8/10"},{"date":"2025-12-21","perfume":"Bal D’Afrique","house":"Byredo","perfumeId":42,"rating":7,"notes":"Byredo bal d’afrique: big fruity opening, creamy suede woody drydown. Violet a couple of hours in, but it becomes very faint. Faint lemon an hour after that. 7/10"},{"date":"2025-12-22","perfume":"Muschio mineralis","house":"Gucci","perfumeId":216,"rating":9,"notes":"Gucci Muschio Mineralis- very unisex, salty, 90s head shop incense, musky. A little sweet but not cloying. Coats the nose and smells expensive. This one is a love. 9/10 Later: layered fading autumn with muschio mineralis and it smelled deep and warm and nutty and cozy and wintery. So beautiful. 10/10"},{"date":"2025-12-23","perfume":"The Eyes of the Tiger","house":"Gucci","perfumeId":219,"rating":8,"notes":"the eye of the tiger. Rich, Ambery, comforting vanilla. I loved this one, although it wasn’t extraordinary, just nice. No commment from Trevor, silence is complicity. 8/10","safeReaction":"mentioned"},{"date":"2025-12-24","perfume":"Rosa sublime","house":"Gucci","perfumeId":214,"rating":9,"notes":"Gucci Rosa Sublime- a thick, opulent saffron rose. So fancy. 9/10"},{"date":"2025-12-25","perfume":"Muschio de luce","house":"Gucci","perfumeId":224,"notes":"Muschio de luce- Trevor says old lady, I still think it’s creamy and cozy Tried onsen saru rollerball- initially liked it but then Trevor said it smelled fecal and that was all I could smell after Le labo patchouli- huge crazy opening but dried down nicely","safeReaction":"mentioned"},{"date":"2025-12-27","perfume":"Another 13","house":"Le Labo","perfumeId":348,"notes":"another 13 all day. I love it but can’t say why.","fuzzy":true},{"date":"2025-12-28","perfume":"Portrait of a Lady","house":"Frederic Malle","perfumeId":188,"notes":"Frederic Malle portrait of a lady- an ACTUAL JUMPSCARE AND IMMEDIATE SCRUBBER. A very loud rose with BO notes? Cumin? It was intense and I was not ready for it. Heretic dirty hinoki- fruity and pine-y, sweet. Like a Hansel and Gretel situation. Fresh and damp, clean-forest smelling Penhaligon’s Elizabethan Rose- a boozy, deep rose with a black tea note, a little spicy, very earthy. This is what portrait of a lady might have been without the offensive opening. Hazelnutty! Dries down a bit powdery like a Crabtree and Evelyn bath crumble"},{"date":"2025-12-29","perfume":"Elisabethan Rose","house":"Penhaligon's","perfumeId":474,"notes":"Le Labo Thé Matcha 26. Has that boozy note that the noir and Elizabethan rose have. Not sure what it is. Light, green tea scent, the boozy note may be fig or wood Le labo Mousse de chene 30- surprise banger! I love this one. Super green and fresh and woodsy without any floral or smokiness. Kids say it smells like Louisiana. Peppery-spicy."},{"date":"2025-12-30","perfume":"Santal 33","house":"Le Labo","perfumeId":347,"notes":"Santal 33: I was sleeping on this one. Familiar because it was ubiquitous and frequently duplicated, but this was sweeter than I expected and not pickle-y. Trevor liked it. A winner.","safeReaction":"positive"},{"date":"2025-12-31","perfume":"Ambrette 9","house":"Le Labo","perfumeId":355,"notes":"ambrette 9- pure alcohol on the spray and then…. Nothing? A little powdery? Pear is developing and it is sweet and musky but so faint. I like it though. I might be anosmic to this Took it off and tried Lys 41- creamy gardenia, very white floral. Reminds me of Kai, which is a single note gardenia. This one seems to have a lot of projection. Peppery? the gardenia settles down a little and it gets a bit muskier Wore Byredo animalique with jhag not a perfume at the back of my neck and it was an amazing combination."},{"date":"2026-01-01","perfume":"Another 13","house":"Le Labo","perfumeId":348,"notes":"another 13"},{"date":"2026-01-02","perfume":"Wood Sage and Sea Salt","house":"Jo Malone","perfumeId":303,"notes":"Jo Malone wood sage and sea salt"},{"date":"2026-01-03","perfume":"Guidance","house":"Amouage","perfumeId":4,"notes":"amouage guidance- loud opening, sweet maraschino cherries and pickles, floral laundry detergent. A little spicy, a little like a plastic doll from the 80s. What IS this? It’s like fruit punch. Nutty. Officially, notes are pear, olibanum and hazelnut at the top, osmanthus, rose, jasmine sambac and saffron in the middle, with base notes of sandalwood, vanilla, ambergris, labdanum and akigalawood. Definitely dries down to apricot (osmanthus) and saffron pretty quickly. Trevor was grossed out and made me scrub it. It’s going to be on my sweater forever. Switched to MFK aqua universalis which Trevor liked and was a good dry musky citrus","safeReaction":"very negative"},{"date":"2026-01-04","perfume":"Musc 25","house":"Le Labo","perfumeId":349,"rating":0,"notes":"le labo musc 25: bleeeccchhhhhh. Straight poop in the opening and then aldehydes (whatever it is I hate in old lady perfumes) and pee and baby powder. Horrible 0/10 Guerlain insolence- opens on sweet Violet candy and stays in Violet territory, but dries down to a classic aldehyde old lady smell. Gucci doesn’t have this. 7/10 because it’s got some old lady notes, but I really enjoyed it. Might try the EDT Byredo Blanche- put on after a bath for night time and it was perfect for that. Crisp, fresh laundry. Loved it, thought about a full bottle. 9/10"},{"date":"2026-01-05","perfume":"Musc Outreblanc","house":"Guerlain","perfumeId":247,"rating":8,"notes":"Guerlain Musc Outreblanc- reminded me immediately of a cacharel perfume from the late 90s, maybe Anaïs anais. This one is mature, a little salty-sweet, and has an old-fashioned dna. I like it, though it is strong for what should be a skin scent. There’s a violet note, and a laconic note, which accounts for the salty sweetness Chanel coromandel: an incensey, resinous, sweet perfume with Chanel DNA (smells like real perfume for sure). Loved this, but might prefer 3 similar entries from Penhaligon’s. 8/10"},{"date":"2026-01-06","perfume":"Sycomore","house":"Chanel","perfumeId":69,"notes":"Chanel sycomore: green, fresh, broken branches off the tree in the front yard on Eden. A little smoke, like you tried to burn a fresh branch."},{"date":"2026-01-07","perfume":"Gris Charnel","house":"BDK","perfumeId":17,"rating":3,"notes":"BDK Gris Charnel- creamy fig and black tea and peppery cardamom. Instant headache, suffocating. I may not like fig/creamy- so far this is in the amouage guidance category of oppressive but I’m hoping the drydown is nice. Knowing I do not like creamy fig with black tea (it’s that cloying boozy note again) makes me realize I love a rose and a violet, or a fresh skin scent. This is bearable but I may scrub it. 3/10 would probably not wear again. The extrait might be better but I don’t like it enough to find out. AN ABSOLUTE SCRUBBER. Boy Smells Violet Ends (old formulation) holy scrubber. Just smells like cigarettes. Not the kind of boy smells I like. 1/10 New Notes Bonbons à la Violette- syrupy and synthetic, grape soda but not cloying. It doesn’t smell real but I like it. Longevity is poor- I can’t smell the drydown, but the Gris charnel on my shirtsleeves has rubbed back onto my wrists, obliterating the bonbons à la Violette. Going to rate it 7/10- weird but good , but short lived. Le labo geranium 33: powdery-peppery-rose-geranium. Pleasant but strong. Would wear again. 7/10"},{"date":"2026-01-08","perfume":"Tobacco Honey","house":"Guerlain","perfumeId":262,"rating":7,"notes":"Guerlain tobacco honey. What it says on the tin. It’s not me but it’s beautiful. a huge, smooth, expensive scent. 7/10 because it’s imposing but gorgeous. BIG."},{"date":"2026-01-08","perfume":"La Violette","house":"Annick Goutal","perfumeId":6,"rating":7,"notes":"annick goutal la Violette: soft, violet leaf and flower, green not sweet. 7/10 because something in it reminds me of refried beans. Otherwise it would be lovely."},{"date":"2026-01-09","perfume":"Absolue pour le matin","house":"Maison Francis Kurkdjian","perfumeId":399,"rating":6,"notes":"MFK absolue de matin: powdery citrus rind- fresh, not sweet, very soft, very safe. Consequently a bit boring . Smells just like Nivea cream. 6/10 because it’s boring, but very wearable. Heretic Dirty Violet: no floral, all green, incense, and musk. Powdery. Patchouli. A bit of rose. Mostly clean musk. This one is amazing and I love it. 10/10 for me, we’ll see if Trevor dismantles that. I just sprayed a half-spray. It’s not dissimilar to Muschio Mineralis. (That’s the patchouli- drydown like the prettiest head shop you can imagine)","safeReaction":"mentioned","fuzzy":true},{"date":"2026-01-10","perfume":"Citrush*","house":"Boy Smells","perfumeId":27,"rating":6,"notes":"boy smells citrush: nice pomelo-aldehyde opening, a little powdery. Sprayed it on at 8:45, pretty much gone by noon. It’s ok. 6/10, not offensive or unpleasant, but not terribly special. Didn’t get the terpenes/poppers note, but this may need more than one light spray. Jo Malone Violet and amber absolu- resinous amber and flashes of sweet violet. I love this one- it’s a combination of two unlikely notes that i love on their own, magic together. Dries down to patchouli. 10/10"},{"date":"2026-01-11","perfume":"Lipstick Fever","house":"Juliette Has a Gun","perfumeId":322,"rating":9,"notes":"Juliette has a gun lipstick fever: 9/10 because it’s very faint, but this is a beautiful not-too-sweet (it’s the raspberry) powdery violet and iris. Plastic doll heads in the opening. Waxy lipstick. We’ll see about the drydown but I’d consider a full bottle of this. I might spray another spray. Very low sillage. 2/10 for performance. Sprayed again (twice) big carroty-iris opening. Really like this. It stayed on all day."},{"date":"2026-01-12","perfume":"Fortuitous Finley","house":"Penhaligon's","perfumeId":479,"rating":8,"notes":"fortuitous Finley: herbal and sweet- grassy anise and violet leaf. A lot like Baie 19, too- wet, fresh, airy, ozonic, salty. I like this- very unisex to masculine. Top note is pistachio. 8/10 Guerlain Shalimar l’essence: like sticking your nose in a cat covered in vanilla flea powder but it’s good 8/10- a little old lady on the opening but perfectly gorgeous drydown"},{"date":"2026-01-13","perfume":"312 Saint-Honore","house":"BDK","perfumeId":21,"rating":8,"notes":"BDK 312 Saint-Honoré: airy, spicy, vaguely white floral (but it’s not at the forefront) and a warm cedar or hinoki wood. Perfectly pleasant on opening, not too loud. (I only do one spray, I’ll do another if it starts to fade and I like jt) official notes say pink pepper, orange blossom, Angelica root and Iris. Ambroxan and white musk (plus the pink pepper) give it a glossier you quality. Thai oud is the woody note. Actually really similar to glossier you. I’m not getting powder at all. So far 8/10, I like it, but I’m not blown away. Absolutely identical to another 13 in the dry down."},{"date":"2026-01-14","perfume":"Eau des Sens","house":"Diptyque","perfumeId":121,"rating":6,"notes":"; diptyque eau de sens. A bitter, powdery citrus. I’m not sure there’s any more than that. It’s pleasant and inoffensive enough. 6/10 for boring. Trevor might like this but it isn’t anything special. Actually smells like carpet deodorizer. Drydown is so faint. Kiehl’s original musk: so animalic and funky on first spray but stick with it and it gets clean and soapy. 8/10? 7/10? This one is challenging and the payoff isn’t as soft and powdery as I might have liked- a definite store tester to full bottle mismatch. Good though, if you can make it to the drydown.","safeReaction":"mentioned"},{"date":"2026-01-15","perfume":"Peau de Peche","house":"Keiko Mecheri","perfumeId":326,"rating":9,"notes":"keiko mecheri peau de peche: super light white tea and juicy white peach. 3 sprays and it is so faint, but really pretty and delicate. Barely there. 9/10 for scent, 5/10 for performance."},{"date":"2026-01-16","perfume":"724","house":"Maison Francis Kurkdjian","perfumeId":401,"rating":6,"notes":"MFK 724 on a chagpt recommendation for airy and light like peau de peche. Smells like gap perfume from the early 2000s. Drydown is really similar to MFK Absolue de matin, boring, powdery citrus. Very similar to eau des sens. 6/10 for boring citrus. (This time without much citrus) Ffern Spring 25: interesting immediately- a minty, herbal opening that makes your mint receptors tingle, with strong, sour lemon zest. As it evaporates you can start to smell the violet but there is air all around this. The Vetiver is a base note but it’s present in the opening. It’s really beautiful and unusual. It’s like cold mint lemonade in a florist’s workroom. Very lush bath bomb but not in a bad way. Rose and Violet with some lemon peel persisting in the middle. 10/10 bought the full bottle right away.","fuzzy":true},{"date":"2026-01-17","perfume":"La Tulipe","house":"Byredo","perfumeId":43,"rating":7,"notes":"Byredo La tulipe- fresh green clean modern floral. Pretty, low projection, inoffensive, beautiful floral opening, creamier in the drydown, 7/10 meets expectations but not exciting. a lot of Vetiver in the drydown. Comme des Garçons 2: clean spicy magnolia with a dry citrus peel note in the opening, then becomes spicy-powdery. Cumin is in the base but pretty far forward at the early opening. Can smell the incense and ink. This one is not boring! Magnolia is a bit overpowering but the ink note is neat. Trevor recoiled in horror. Scrubbed it off before I got to the drydown. 6/10, green floral is more overpowering than fresh. Too sharp. Chanel Misia: SOO MUCH IRIS in the opening. Just a Blast of pure Iris. After the big Iris opening, I get sweet (but not too sweet) violet. This one is dry, has no Chanel aldehydes up front, and low sillage to keep it discreet. Five minutes later, a very pretty, berry, jammy, sweet subtle rose. Then it becomes powdery like a chalky bath crumble. The drydown is pure lipstick. 9/10","safeReaction":"very negative"},{"date":"2026-01-18","perfume":"Escentric 01 (x2)","house":"Escentric Molecules","perfumeId":172,"rating":7.5,"notes":"Escentric molecules Escentric 01-light floral, but not white floral- green woods? This one is mysterious. Aromatic and chemical. If tam dao and Juliette has a gun had a baby. I like it. Lasts about 5 hours, needs 2 sprays. Not breaking any new ground- I’d wear tam dao if I wanted this smell. 7.5/10 Balenciaga Paris: top note of bright lemon, some buttery Iris, violet or rose? Pretty, sweet purple floral with a woody base. (Officially bergamot, Violet, cedarwood and carnation.) classic in the vein of insolence and apres l’ondee, but more perfume-y and less sugary sweet. This one has patchouli in the base, so I’m looking forward to that. Not unique, or exciting, but very pretty and well blended. 8/10 for the opening, we’ll see what the drydown does. Update: boring perfume. Final rating 7/10- it’s fine. 7.5/10 I guess. Osmanthus Nectar is honeyed vanilla peach, warm and sweet, and resinous like a baked nectarine. Syrupy without being sweet. Really lovely. 8/10"},{"date":"2026-01-19","perfume":"Where my heart beats","house":"Gucci","perfumeId":233,"rating":8,"notes":"where my Heart Beats: rose and white floral at the opening, reminds me of eau d’issey- it’s airy and mineral peony. The violet leaf is green and apparent if you apply enough. This dries down subtly and pleasantly enough- it’s a very solid, very pretty 8/10. A springtime classic- light and billowy and soft. (Checked and l’eau d’issey is also musk and peony so there. My nose works.) nicely musky at the end of the day."},{"date":"2026-01-20","perfume":"Gris Dior","house":"Dior","perfumeId":116,"rating":8,"notes":"Dior Gris Dior- challenging and boozy opinion reminiscent of Thé Noir or Gris Charnel, but soon dries into a cedar forward Rose patchouli with powdery bergamot in the background. I think Penhaligon’s does rose patchouli a bit better but this one is spicy and nice. 8/10 longevity is meh JHAG musc invisible- it’s identical to Kiehl’s drydown, which is unfortunately identical to dish soap. I mean I guess if I’m in a musk mood, this would be a go-to. 7.5/10 because it gets the job done. Acne studios Frederic Malle: it’s both soapy and fruity. Olive says public restroom. Pink McDonald’s soap. 5/10 Chanel Comète: Violet! Bubble bath! Iris! Cherry! Aldehydes from the Chanel DNA! It’s the favourite but fancier. 8/10. Pretty pretty good. Soapy, musky drydown."},{"date":"2026-01-21","perfume":"White Musk","house":"The Body Shop","concentration":"EDT","perfumeId":533,"rating":8,"notes":"the body shop white musk eau de parfum: this is exactly what I was looking for- lasts all day, smells amazing, irritates my lungs like crazy. If I had a sweet single note raspberry, I could layer it and hit that scent memory. But I don’t. 8/10 for irritation. Going to try layering with Marc Jacob’s daisy eau so fresh. (Have not done this yet)"},{"date":"2026-01-22","perfume":"Velvet Haze","house":"Byredo","perfumeId":34,"rating":7,"notes":"Byredo velvet haze: what it says on the tin. A soft, chocolatey patchouli that is not inoffensive or structured- just a tiny cloud of softness with a little jasmine funk. It’s ok but not for me. 7/10 because it was nicely blended and conveyed its intended purpose. Arquiste the architects club: this one is something! Not boring. Spicy, tart sour citrus, juniper maybe? Something evergreen. Salt air. Vetiver. Really fresh and structured and unisex. I like this one and think it’s clear and focused and clean. 8.5/10. Dries down powdery but in a woody vanilla way, even though there is Orris. it’s sweet. A surprise love."},{"date":"2026-01-23","perfume":"Femininite du bois","house":"Serge Lutens","perfumeId":524,"rating":5,"notes":"serge Lutens feminine du bois: a very spicy almost potpourri rose- maybe a scrubber? Reminds me of Lush, very peppery. going to stick with it for a while but it’s harsh. Apparently it’s plum and cinnamon. Update: scrubbed. Saving this for a snowy night. 5/10 weird in a bad way Guerlain herbes troublantes: green herbs and Lemon rounded out by something… musk apparently. There’s mint and the lemon is actually bergamot. Super fresh, very smooth and well blended. Guerlain does it again. 7.5/10 because I don’t know that it’s feminine or if I would reach for it but it’s undeniably good. Smells like a fancy hotel lobby. Will update with the drydown. Did not last very long at all. Faint unsweetened orange in the drydown. Etat libre d’orange Putain des Palaces: so far just powdery iris - vaguely floral, but not white floral. A rich spicy ginger at the top. Rose. They say raspberry is in there but I don’t detect it. Pleasant, I get the rococo association- it’s hyper feminine in a done-up way. Not for wearing with a suit but definitely for ruffles. Not sweet, not outwardly floral. Just spicy powdery for now. Thought it would be more like insolence (which REEALLY says putain de la palace) but it’s not sweet or fruity. Getting geranium and rose as it wears. And raspberry comes out about 30 minutes later. Drydown is sweet violet. 9/10 for this one."},{"date":"2026-01-24","perfume":"La Petite Robe Noire (2012","house":"Guerlain","concentration":"EDP","perfumeId":257,"rating":8.5,"notes":"Guerlain la petite robe noire- insolence DNA, pretty cherry. A Shirley temple of a perfume. 8.5/10 Body shop musk oil- these all smell the same- oil, perfume, body spray, Kiehl’s musk- totally redundant soap smell. I might prefer the body spray because it is the lightest. 7/10 Diptyque eau nabati - warm tobacco vanilla incense- this is a halfeti or Yasmine perfume and I like it a lot. 8/10 Louis Vuitton orage: pissy, woody (sandalwood or a blonde wood? Resinous, piney. Leans masculine . 6.5/10, I like it and think it might transform throughout the day but it didn’t wow me. D’annam Kimono- white rice and lipstick, a little white floral and violet. This one is a beauty. The rice note is unusual, but so creamy and warm. The violet is sweet. So pretty. 9/10"},{"date":"2026-01-26","perfume":"Carmina","house":"Creed","perfumeId":102,"rating":8,"notes":"creed carmina- a grown up violet, very perfumey, 8/10 because it’s a sophisticated violet floral but also makes me realize I don’t love classic perfume that much, I prefer indies and niches to big fancy houses. Opened with saffron, which I love, but Jo Malone wins this one. Penhaligon’s violetta- identical to annick goutal down to the refried beans note Vilhelm parfumerie basilico and Fellini- really interesting- juicy, dry grassy without being green, herbal and fruity. 7/10 Vp morning chess- sexy and masculine, top note of bergamot, warm woody leather. Dressy but very much for men. 8/10 I liked it. Tom ford violet blonde- woody spicy Violet with notes of jasmine and palo santo. 7/10 Dries van noten fleur du mal- light, airy, leather and Osmanthus rose- feel like a grounding note is missing. Nice enough 7/10"},{"date":"2026-01-27","perfume":"Spring 25","house":"Ffern","perfumeId":186,"rating":9,"notes":"Ffern spring 25- wearing this again because I got the full size today- and I’m glad I did. Louis Vuitton l’immensite- decidedly for men, but DREAMY- 9/10 on a guy. Spicy and citrus. Guerlain iris pallida 6: creamy iris, sophisticated but not unpleasant. Sweet (that’s the almond note) and not terribly powdery- like a grownup Lolita Lempicka. 10/10"},{"date":"2026-01-28","perfume":"Iris Malikhan","house":"Maison Crivelli","perfumeId":392,"rating":7,"notes":"Iris malikhan, Maison crivelli- a fairly perfumey iris that verges on old lady without being fully old lady. Sophisticated with low projection but it’s no iris pallida. 7/10 Guerlain Cuir beluga: linear salty playdough, powdery sweet vanilla suede. I’m sure there is a time and place for this, but not sure when or where. 6/10 because it’s well blended and subtle but it’s also wtf playdough. YSL Babycat: a mystery winner. 10/10. A gentler halfeti. A more modern Shalimar l’easence. So soft and powdery and sweet and gorgeous. Was not expecting to love babycat.","fuzzy":true},{"date":"2026-01-29","perfume":"Little Flower","house":"Regime des Fleurs","perfumeId":507,"rating":9,"notes":"regime des Fleurs Chloe sevigny little flower: sweet, incensey, iced tea rose. Really a masterful blend of notes to get the perfect rose. Portrait of a lady dialed back to 5. Better than all the Penhaligon’s roses. 9/10 so good. Vilhelm parfums Poets of Berlin: blueberry and WOOD? This is supposed to evoke iggy pop and David Bowie living in Berlin eating pastries. Ok sure. It smells pretty good. Fruity and buttery without being cloying. Develops in to something VERY sweet, maybe too sweet. Drydown is a grassy vanilla. 7/10- good but not full bottle worthy, there when I need to smell like a muffin. DS & Durga black magenta- dark violets, brine? saffron? Not sweet, barely floral, powdery but dark. Sweet, non-acidic pineapple and pepper, iris and amber and sandalwood. The pineapple really shines through at the top after the opening but there is still something deep and salty about it- roasted pineapple maybe. Very interesting. 7.5/10, not huge projection. Dries down into powdery fruity iris, very pleasant Byredo animalique- wore to olive’s performance- really suede-y this time. Love this for a night out."},{"date":"2026-01-30","perfume":"Atelier des Fleurs violet","house":"Chloe","perfumeId":93,"rating":10,"notes":"Chloe atelier des Fleurs Violet: elegant, prim Violet soliflore, a perfect example of beta a violet fragrance should be (mercifully free of bean notes, not old lady, not too sweet.) longevity is not perfect- sprayed on at 8:45, very faint by 2:15, which is fine. It’s a 10/10, very lovely, safe but not boring. No weird notes. Guerlain Iris torréfié: more spicy floral than Iris Pallida, which leans vanilla, but still a rich Iris. This one has a deep coffee note and a sharp bergamot top note. Again, Guerlain never misses. 9/10, I think pallida wins this one but they are both good. Lipstick and coffee. Louis Vuitton rose de vents- a straightforward spicy rose, right in the middle of little flower and portrait of a lady. Actually really similar to little flower. Rose, pepper, Iris and cedar. 8/10 Samples Frederic Malle lipstick rose and MMM lipstick on. Why do all Frederic malles have a weird funky note? By Rosie Jane Rosie perfume oil: a perfect salty light floral musk. Maybe the best musk? 9/10"},{"date":"2026-01-31","perfume":"Summer 25","house":"Ffern","perfumeId":187,"rating":7,"notes":"Ffern summer 25- sweet citrus, incense? Maybe faint peach? Ffern all smells like smarties candy to me. 7/10, missing the oomph of the mint and lemon of spring 25. Powdery woody in the dry down. 19-69 San Pedro- really similar to Ffern soring 25 but with a bit more peach and a powdery note. Fresh and green. Cactus? 6.5/10, fresh and good for summer. Diptyque orpheon- 10/10 no notes, understated cedar and jasmine- so elegant and soft"},{"date":"2026-02-01","perfume":"Vietnamese Coffee","house":"D'Annam","perfumeId":107,"rating":7,"notes":"D’annam Vietnamese coffee- sweet, bitter, photorealistic. Possibly too gourmand but I’ll wait a while to decide. Good Sunday morning perfume, pretty syrupy though. 7/10 Pomelo oolong smells like a boba shop- lychee tea. White floral. Photorealistic and mouth watering 9/10"},{"date":"2026-02-02","perfume":"Floating","house":"Liis","perfumeId":375,"rating":7,"notes":"Liis floating: a soft skin scent peach, a bit musky. I sprayed both wrists and my chest and it’s really faint, but pretty. 7/10, ethereal but not detectable Goutal eau d’hadrien- a really good, fresh, unsweetened citrus that doesn’t smell like cleaning products. 8/10 Parfum d’empire equistrius: champagne and powdery violets, Iris. Really pretty. 8/10 Vilhelm parfumerie chimilka: Fuzzy juicy funky BO peach- sweet (maybe too sweet) with a mouthwatering tea note, like a sweaty boba shop (though no real lactonic notes) sugar note does some heavy lifting in the opening- very strong. 7/10"},{"date":"2026-02-03","perfume":"Bubble Bath","house":"Maison Margiela Replica","perfumeId":406,"rating":8,"notes":"Maison Margiela bubble bath- okay I guess. I don’t really love it. It’s too soapy or floral or sweet or something. The favourite is so much better, I don’t really need this one. Chanel n° 19 poudré- big opening of Iris and aldehyde, dries down to the softest powder. 8/10 lovely and classic. Lasts all day as a rich Iris. Chanel is Chanel for a reason.","fuzzy":true},{"date":"2026-02-04","perfume":"Fragrance 03 blonde","house":"Dedcool","perfumeId":114,"rating":7,"notes":"Dedcool 03 Blonde- woody green violet with some leather and rose. It’s masculine but also violet-sweet. I like this but it isn’t girly. Jo Malone Violet and amber absolu does what this should do so I think it’s unfortunately a bit redundant, but I rank it higher than tom ford violet blonde which it is clearly copying. 7/10, earthy, green, woody, sweet. Miu Miu eau rosée- dewy fruity light air rose with a sweet juicy pear opening, maybe a white floral in there? Really pretty, would buy a full bottle maybe. 8/10 because I don’t think this is going to last long. What is anchoring this, light cedar? I’m way off- this is lychee, lily of the valley, and white musk. I caught the sweet light fruit and white floral at least. Thierry mugler Angel: nope nope nope nope smells like piss on my skin. 0/10 couldn’t stick with it, had to scrub. Prada infusion d’iris: opening is overpowering alcohol, hopefully this dries into something else. It’s creamy Iris but also the sort of carpet powder note in eau des sens. I think I am spoiled by Chanel and guerlain irises. Still, 7.5/10, I love a good Iris. Probably wouldn’t reach for this one though. DS and Durga Big Sur eucalyptus- sprayed on to focus, we shall see if it works. It’s definitely eucalyptus, though there is something seaweedy or creamy or otherwise weird about it. Very fresh. 7.5/10- I like this but it’s odd. Dries down to be very mild. Prefer Le labo eucalyptus Le labo labdanum 18: animalic powdery warm vanilla amber- aromatic powder with a spicy resinous quality. Really pleasing, musky and not remotely floral. Syrupy drydown, funky","fuzzy":true},{"date":"2026-02-05","perfume":"Violette in Love","house":"Nicolai","perfumeId":448,"notes":"parfums de Nicolai Violette in love- Iris opening, soapy violet. Really a light cloud of soapy iris and violet. It’s nice! Irisy without being too powdery, violet without refried beans"},{"date":"2026-02-06","perfume":"Hermes Concentré de Pamplemousse Rose","house":"Hermes","perfumeId":291,"rating":9,"notes":"Hermes concentre de pamplemousse rose- a 9/10 deep, serious citrus. This one is mature and complex, not light or cleansery. What I wanted from Jo Malone. Pretty dark rose, grapefruit and woody Vetiver. Opens with bitter citrus and dries down into a juicy but tart rose"},{"date":"2026-02-07","perfume":"Patchouli Paris","house":"Guerlain","perfumeId":250,"rating":8,"notes":"Guerlain patchouli Paris - good, expertly blended, objectively nice, in the family of babycat and halfeti, chocolatey drydown. 8/10"},{"date":"2026-02-08","perfume":"White Rice","house":"D'Annam","perfumeId":105,"rating":7,"notes":"D’annam white rice: initial opening of actual steamed white rice, then some kind of aldehyde floral in the drydown. Wish it was white rice the whole time. Laconic, panda. Leaf and musk are responsible for the drydown. Just wear diptyque. 7/10 D’annam strawberry mochi: weirdly ricier than white rice but also sweet. Persie says “it smells like cookies” 7/10 maybe too gourmand. Ultimately a scrubber."},{"date":"2026-02-09","perfume":"ganymede","house":"marc-antoine barrois","perfumeId":413,"rating":5,"notes":"Ganymede: leather, metal, violets, antiseptic, skanky, spicy. I cannot wear this to the dentist. 5/10 I am curious. Projection is HUGE for a smell that is so weirdly indecent. I want to try one small spray of this and let it sit a while. Ormonde Jayne evernia- ugh perfume 6/10 Hermes musc pallida- unisex soapy musk and understated iris. Elegant. 8/10 thin white duke era Bowie. DS & Durga Debaser- pina colada that turns to creamy fresh green fig- a fig I can get behind. Reminds me of the fig trees by my preschool when I was little- fuzzy, photorealistic. This is so nice and fruity without being too sweet- very fresh. The coconut milk is lovely. 8/10 INTERESTING. Dries down to Abercrombie and fitch cologne, scrubs off easily. This one is good for a couple of hours Etat libre d’orange- she was an anomaly: Iris and musk forward in the opening, sharper citrus and white floral in the middle. I like it! 7.5/10, this is a skin scent better executed by Guerlain (Iris Pallida) Hermes (musc pallida) glossier (you) or 10:15 (sonic flower)"},{"date":"2026-02-10","perfume":"Loewe 7","house":"Loewe","perfumeId":378,"rating":8,"notes":"loewe 7: impressions: sweet, resinous, incense-y, but light. More niche than patchouli, can’t put my finger on it- incense, red pepper berries, sweetness from red apple. Genius. I have rated this before but today I am wearing it. 8/10 stands, delightful. It’s for men, but who cares. Just kidding, let’s switch it up. For some reason the fact that it’s for men made me not want to wear it. Dries van noten neon garden: creamy Iris opening- almost a soliflore iris on me- but there’s mint and carrot seed, and Ambroxan and musk in the drydown. We’ll see how this develops- I would like a spray instead of a dabber here. Fresh creamy Orris,carrot, really nice. 10 hours later this is still crazy strong, it gets compared to baccarat rouge, I’m not sure if that’s right, but it’s very synthetic BO and even stronger than when I put it on in the morning. Insane longevity. Still creamy Iris, but with shaving cream sprayed on it. It stayed on FOREVER. 8/10 for the opening, 5/10 for the drydown. How does a perfume get louder and stronger after hours and hours of wear?"},{"date":"2026-02-11","perfume":"Violette 30","house":"Le Labo","perfumeId":346,"rating":9,"notes":"le labo Violette 30: got my official sample, it’s still Santal 33 and another 13 with a little violet. 9/10"},{"date":"2026-02-12","perfume":"Lilyphea","house":"Diptyque","perfumeId":143,"rating":6,"notes":"diptyque lilyphea- it’s SO GREEN. Watery. Fresh. White floral. Almost a honeydew melon (in my experience, light fruit is usually pear). That’s the vanilla. 6/10- not too exciting but not boring or bad. Actually kinda bad once you get to the vanilla. Baccarat rouge 540- toasted marshmallows, strawberry and saffron on your opening. I did two sprays which was 1.5 sprays too many. Not today satan. 5/10 Henry rose windows down: nice grapefruit and bergamot opening, pleasant musky drydown. Can probably find a fancier version of this, but it’s nice. 7/10 Jo Malone lime basil mandarin. 7.5 out of 10, used it as a focus scent, wasn’t really able to focus, the end. One of the better citrus options."},{"date":"2026-02-13","perfume":"Chloe sevigny regime des Fleurs little flower","house":"","rating":9,"notes":"Chloe sevigny regime des Fleurs little flower- a know quantity, 9/10 really good. Rosie - couldn’t smell it, 3/10 Indigo Smoke 9/10 incredible O, Unknown - also tea, more tannic, not quite as good as indigo smoke. 7/10 Saint Julep SWEEEEEEET 7/10 French Defense 9/10 opening 5/10 drydown, a scrubber Memoire d’une odeur- super elegant and fancy, chamomile and hotel lobby 9/10","unmatched":true},{"date":"2026-02-14","perfume":"Neroli Outrenoir","house":"Guerlain","perfumeId":259,"rating":8.5,"notes":"neroli outrenoir- heavenly citrus and tea Chanel gardenia: a perfect gardenia, opens photorealistic and peppery, dries down in a linear fashion. Really nice, 8.5/10 Arquiste indigo smoke- this, funnily enough, dries down to be identical to Chanel Sycomore (or coromandel?) but it’s gorgeous and woody and smoky and tannic at the opening. I like Thai house a lot. 9/10"},{"date":"2026-02-15","perfume":"Poivre 23","house":"Le Labo","perfumeId":363,"rating":8,"notes":"Poivre 23- in the realm of babycat and halfeti in that at its core, it is a vanilla patchouli, but it has a beautiful spicy black pepper opening, dry, warm Gaiac wood in the base. Smells like a shop in Chinatown- incense and spices, sweetness. 8/10 Tonka 25- This one is maybe animalic, resinous, soapy-musky in the opening. Spicy, a bit. Orange blossom and cedar are there. Persie says it smells like cookies (it does not) but it does get creamier as it wears. Super cozy and musky in the drydown 8/10 By Rosie Jane Rosie edp- initially anosmic to this but now I’m getting musky white floral and… burnt hair!? Super weird the way this burns my nostrils. Burning eventually went away but I prefer the oil. 8/10 for the smell, 0/10 for the burning sensation in my nose. Im also not anosmic to the oil."},{"date":"2026-02-17","perfume":"Lavande 31","house":"Le Labo","perfumeId":352,"rating":9,"notes":"le labo lavande 31- neroli and musk make it similar to bigarade 18, but this is a 9/10- lavender makes it pleasantly soapy. Very good, very wearable."},{"date":"2026-02-18","perfume":"Fleur D’Oranger","house":"Le Labo","perfumeId":353,"rating":8,"notes":"le labo fleur d’oranger- photorealistic orange blossom with lemon in the opening, a nice citrus, no wood notes here, just citrus and musk. 8/10 opening, really nice"},{"date":"2026-02-20","perfume":"Rose 31","house":"Le Labo","perfumeId":360,"rating":4,"notes":"le labo rose 31: peppery spicy rose opening, cumin note (whyyyyyy do they do that?) so it’s very funky. SCRUBBER 4/10. I don’t know if I should try again to get past the challenging opening but it’s just such a foul BO/dirty note. Serge Lutens fille en aiguilles - piney pine sap, so wintery- smoky, woody- literal pine needles 7.5/10 this becomes feu de bois in the drydown- upgrading to 9/10 Miu Miu edp- 10/10 really pleasant- rose, musk, white floral, aquatic/mineral notes. Airy, watery, if pale blue were a fragrance. Love this. Longevity isn’t super, but it’s gentle and lovely"},{"date":"2026-02-21","perfume":"Vanille 44","house":"Le Labo","perfumeId":367,"rating":9,"notes":"le labo vanilla - a cardboard, tree bark vanilla, not too sweet, creamy, 9/10 not gourmand Le labo myrrhe- resinous and fruity- I guess it’s balsamic- osmaththus? Rich apricot? Like a fruit roll up at church. 7.5/10 I like it but don’t know if I would reach for it. It is JASMINE. Upgrading to 8.5/10- this smells like jasmine peach milk tea when it dries, just gorgeous D’annam hinoki meditation: smells like a Japanese bath, skin, cedar trees. There’s a little bit of a funk, similar to onsen saru, but it’s not unbearable. Masculine drydown 7.5/10 (kind of similar to Dries van noten neon garden where it doesn’t match)"},{"date":"2026-02-22","perfume":"Benjoin 19","house":"Le Labo","perfumeId":370,"rating":7.5,"notes":"Le labo benjoin 19: woody resinous, sweet with a vinegar note, dusty library challenging opening but very interesting 7.5/10 Le labo Osmanthus 19: this is a green woody leafy boozy scent in the opening. Also resinous but there is a faint woody peach in there. Some smokiness comes in. Soapy lavender. Complex and pretty, Low sillage- that makes sense since it’s the Kyoto exclusive need to try again and maybe overspray, for now 8/10 huge potential Chanel Paris-Biarritz: it’s so green. Faint tart citrus. Fades away immediately 7.5/10 Guerlain pamplelune: initially a good and photorealistic grapefruit, but the drydown is all patchouli, blackcurrant and vanilla. It’s okay but not the fresh citrus I wanted 7/10 Diptyque L’eau des Hesperides- minty lemon fresh fresh fresh. I think Ffern spring 25 does this better/sweeter, but this is definitely an herbal citrus. Reminds me of slc hotel body wash, airy, salty citrus. 8/10 Clean reserve skin- like by Rosie Jane with the caramel note. This actually burns my nose the same way as by Rosie Jane 7/10"},{"date":"2026-02-23","perfume":"Bal D’Afrique","house":"Byredo","perfumeId":42,"rating":7.5,"notes":"Byredo bal d’afrique: safe, elegant, fruit punch and sandalwood 7.5/10 leather and violet in the drydown, really similar to Animalique"},{"date":"2026-02-24","perfume":"Ethereal Wave","house":"Liis","perfumeId":376,"rating":8,"notes":"Liis ethereal wave- light citrus tea, fruity and bitter. Nice, airy. 8/10"},{"date":"2026-02-25","perfume":"Vanille 44","house":"Le Labo","perfumeId":367,"rating":9,"notes":"le labo vanille 44: Paris exclusive, woody vanilla, 9/10 smooth and unobtrusive"},{"date":"2026-02-26","perfume":"Lost Cherry","house":"Tom Ford","perfumeId":547,"rating":9,"notes":"tom ford lost cherry: opens like cherry pie filling spilled on the Macy’s counter. Mellows to a sweet, mild cherry. I’m wearing a leather jacket so I might be bringing my own leather note here. Dries down to a mellow cherry almond, it’s very Guerlain petite robe noire or imaginary authors a little secret. High quality and smooth, though. This is a 9/10 for sure. Gourmand but good"},{"date":"2026-02-27","perfume":"Tubereuse 40","house":"Le Labo","perfumeId":366,"rating":9,"notes":"le labo Tuberuse 40- neroli forward with cedar and white floral notes- a smooth and tolerable white floral, 9/10, short longevity though. Le labo Ylang 44: heavy patchouli, tropical incense","fuzzy":true},{"date":"2026-03-01","perfume":"","house":"Miu Miu","concentration":"EDP","perfumeId":428,"rating":8,"notes":"Miu Miu bleue; all the Miu Miu dna is the same- airy light lily of the valley, but I also love them that way. 8/10, sparkling citrus, unobtrusive"},{"date":"2026-03-02","perfume":"Colette","house":"Tocca","perfumeId":535,"notes":"tocca Colette- pretty and powdery but more sandalwood in the opening than I remember. A repeat wear, I like this one. Really similar to Byredo"},{"date":"2026-03-03","perfume":"Orpheon","house":"Diptyque","concentration":"EDP","perfumeId":141,"rating":10,"notes":"Orpheon edt: 10/10 signature material Lasts all day, powdery sharp citrus"},{"date":"2026-03-04","perfume":"The virgin violet","house":"Gucci","perfumeId":213,"notes":"Gucci the virgin violet - comfort zone, needed something that wouldn’t fight with my white musk body wash. Later, Orpheon EDT."},{"date":"2026-03-05","perfume":"Orpheon","house":"Diptyque","concentration":"EDP","perfumeId":141,"notes":"Orpheon edp. I just love Orpheon."},{"date":"2026-03-06","perfume":"L'ombre dans l'eau","house":"Diptyque","perfumeId":134,"notes":"diptyque, L’ombre dans l’eau. A watery, spicy rose."},{"date":"2026-03-07","perfume":"Chance Eau Splendide","house":"Chanel","perfumeId":90,"notes":"Ch // ─── CORE NOTE PROCESSING ─────────────────────────────────────────────────────
function processNotes(str) {
  if (!str) return [];

  // Step 1 – Strip tier labels (all formats: "Top notes are", "Top:", "Top note is", etc.)
  let s = str.replace(/\.$/, '');
  const TIER_PATS = [
    /top\s+notes?\s+(are|is)\s*/gi, /middle\s+notes?\s+(are|is)\s*/gi,
    /heart\s+notes?\s+(are|is)\s*/gi, /base\s+notes?\s+(are|is)\s*/gi,
    /main\s+notes?\s*:\s*/gi, /notes?\s*:\s*/gi,
    /top\s*:\s*/gi, /middle\s*:\s*/gi, /heart\s*:\s*/gi, /base\s*:\s*/gi, /head\s*:\s*/gi,
    /top\s+notes?\s+/gi, /middle\s+notes?\s+/gi,
    /heart\s+notes?\s+/gi, /base\s+notes?\s+/gi,
  ];
  for (const p of TIER_PATS) s = s.replace(p, '; ');

  // Step 2 – Split on separators including "+" and bullet "•"
  const rawFrags = s.split(/[;,\n+•]+/)
    .map(n => n.trim()
                .replace(/^and\s+/i,'')
                .replace(/^(?:are|is|the)\s+/i,'')
                .replace(/^(?:notes?|main\s+notes?)\s*:\s*/i,'')
                .trim()
                .replace(/[.,]\s*$/,'')
                .replace(/\s*\(description.*\)$/i,'')
                .replace(/\s*\([^)]*\)\s*$/,'')
                .replace(/^\(+/,'')
                .replace(/\)+$/,''))
    .filter(n => n.length > 1 && n.length < 120);

  // Step 3 – Also split anything with "/" if it yields 3+ pieces
  const frags = [];
  for (const f of rawFrags) {
    const slashParts = f.split('/').map(p => p.trim()).filter(p => p.length > 1);
    if (slashParts.length >= 3) frags.push(...slashParts);
    else frags.push(f);
  }

  // Step 4 – Resolve each fragment
  const notes = [];
  for (const frag of frags) {
    const lower = frag.toLowerCase().trim();
    if (!lower || lower.length < 2) continue;

    // a) Exact match in SPLIT_MAP
    if (SPLIT_MAP[lower]) { notes.push(...SPLIT_MAP[lower]); continue; }

    // b) Exact match in CANONICAL_MAP
    if (lower in CANONICAL_MAP) {
      if (CANONICAL_MAP[lower] !== null) notes.push(CANONICAL_MAP[lower]);
      continue;
    }

    // c) Family term → skip
    if (FAMILY_TERMS_SET.has(lower)) continue;

    // d) Try splitting on " and " if both sides are short, plausible notes
    if (lower.includes(' and ')) {
      const parts = lower.split(' and ');
      if (parts.length === 2 && parts[0].trim().length > 1 && parts[1].trim().length > 1 &&
          parts[0].trim().length < 28 && parts[1].trim().length < 28) {
        for (const part of parts) {
          const pt = part.trim();
          const canon = CANONICAL_MAP[pt];
          if (canon !== null) notes.push(canon !== undefined ? canon : pt);
        }
        continue;
      }
    }

    // e) Strip common suffixes and recheck
    let cleaned = lower
      .replace(/\s+absolute$/,'').replace(/\s+essence$/,'').replace(/\s+extract$/,'')
      .replace(/\s+accord$/,'').replace(/\s+tincture$/,'').replace(/\s+oil$/,'')
      .replace(/\s+resin$/,'').replace(/\s+from\s+\w[\w\s]*$/,'')
      .replace(/\s+\(.*?\)$/, '').trim();

    if (cleaned !== lower && cleaned.length > 1) {
      if (cleaned in CANONICAL_MAP) {
        if (CANONICAL_MAP[cleaned] !== null) notes.push(CANONICAL_MAP[cleaned]);
        continue;
      }
      if (FAMILY_TERMS_SET.has(cleaned)) continue;
    }

    // f) If length > 60, probably a garbage blob — skip
    if (lower.length > 60) continue;

    // g) Keep — use cleaned form if suffix-stripped, else original
    notes.push(cleaned !== lower && cleaned.length > 1 ? cleaned : frag.trim());
  }

  // Deduplicate preserving order
  const seen = new Set();
  return notes
    .filter(n => { const k = n.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; })
    .map(n => n.charAt(0).toUpperCase() + n.slice(1).toLowerCase()
           // preserve known multi-word capitalisations
           .replace(/\biso e super\b/gi, 'ISO E Super')
           .replace(/\bambrox\b/gi,'Ambrox').replace(/\bambrette\b/gi,'Ambrette')
    );
}

const _BAD_TAG_PAT = /\b(top|middle|heart|base|main)\s+notes?\b/i;
function cleanTags(tg) {
  return (tg || []).filter(t =>
    !_BAD_TAG_PAT.test(t) && t.length < 35 && !/ and /i.test(t) &&
    !/\.$/.test(t) && !/^notes?:/i.test(t)
  );
}

function canonicalizeRawTags(tags) {
  return [...new Set((tags || []).map(tag => {
    const raw = tag.toLowerCase().trim();
    // Check original string in CANONICAL_MAP first (handles "orris/iris", "iris/orris", etc.)
    if (raw in CANONICAL_MAP && CANONICAL_MAP[raw]) return CANONICAL_MAP[raw];
    // Replace slashes and extra spaces, then check again
    const lower = raw.replace(/[\/]/g, ' ').replace(/\s+/g, ' ').trim();
    if (lower in CANONICAL_MAP && CANONICAL_MAP[lower]) return CANONICAL_MAP[lower];
    return lower;
  }).filter(tag => {
    if (!tag) return false;
    // Single-word tags are always kept
    if (!tag.includes(' ')) return true;
    // Multi-word: only keep known valid taxonomy tags
    return VALID_MULTI_WORD_TAGS.has(tag);
  }))];
}

function normalizePerfume(p) {
  const primary = canonicalizeRawTags(cleanTags(p.pm || [])).filter(t => !PRIMARY_TAG_BLACKLIST.has(t));
  // Allow 'musk' as a primary tag only for genuinely musk-forward perfumes:
  // (a) name contains musk/musc/muschio, OR (b) family field is predominantly musk
  //     (i.e. the only or main family token is a musk variant)
  const nameL = (p.n || '').toLowerCase();
  const famTokens = (p.f || '').toLowerCase().split(/[\s,/\-]+/).filter(Boolean);
  const MUSK_NAME_WORDS = ['musk','musc','muschio','musqué','musky'];
  const nameHasMusk = MUSK_NAME_WORDS.some(w => nameL.includes(w));
  // "predominantly musk" = family has ≤2 non-musk tokens (e.g. "musky" or "musky, floral")
  const NON_MUSK_FAM_WORDS = new Set(['musk','musky','musks','musc','musqué']);
  const nonMuskTokens = famTokens.filter(w => !NON_MUSK_FAM_WORDS.has(w));
  const famIsMoskPrimary = famTokens.some(w => NON_MUSK_FAM_WORDS.has(w)) && nonMuskTokens.length <= 1;
  if ((nameHasMusk || famIsMoskPrimary) && !primary.includes('musk')) primary.push('musk');

  return {
    id: p.i, house: p.h, name: p.n, concentration: p.c || "",
    fullName: p.h + " — " + p.n + (p.c ? " " + p.c : ""),
    family: p.f || "",
    rawNotes: p.no || "",
    notesList: processNotes(p.no || ""),
    notes: processNotes(p.no || "").join("; ") || p.no || "",
    rating: p.r ?? null, tried: p.t ?? false,
    preference: p.pr || "Unrated", status: p.st || "Unrated",
