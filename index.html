// ─── HELPERS ──────────────────────────────────────────────────────────────────
function matches(p, { family, character, lanes, safeOnly, excludeAvoid, triedOnly, search, pref, primaryOnly, laneMode, gender }) {
  if (excludeAvoid && (p.status === "Avoid" || p.status === "Dislike")) return false;
  if (gender && gender !== "All" && p.gender !== gender) return false;
  if (triedOnly && !p.tried) return false;
  if (pref !== "All" && p.preference !== pref) return false;
  if (safeOnly && p.safeScore < 7) return false;
  // Family filter
  if (family && family !== "All") {
    const f = family.toLowerCase();
    const tagList = primaryOnly ? (p.primary || []) : p.tags;
    if (!tagList.includes(f)) return false;
  }
  // Character filter
  if (character && character !== "All") {
    const c = character.toLowerCase();
    const tagList = primaryOnly ? (p.primary || []) : p.tags;
    if (!tagList.includes(c)) return false;
  }
  // Specific notes
  if (lanes && lanes.length > 0) {
    const tagList = primaryOnly ? (p.primary || []) : p.tags;
    if (laneMode === "any") {
      if (!lanes.some(l => tagList.includes(l))) return false;
    } else {
      if (!lanes.every(l => tagList.includes(l))) return false;
    }
  }
  if (search) {
    const q = search.toLowerCase();
    if (!p.fullName.toLowerCase().includes(q) && !p.notes.toLowerCase().includes(q) && !p.tags.join(" ").includes(q)) return false;
  }
  return true;
}

// ─── GENDER FROM NAME ────────────────────────────────────────────────────────
// Only infer gender from unambiguous words in the perfume name.
// Everything else stays null until the user sets it via the edit panel or imports
// from the spreadsheet.
function inferGenderFromName(name) {
  const n = (name || '').toLowerCase();
  // Masculine keywords — whole-word or phrase match to avoid false positives
  if (/\b(pour homme|pour lui|for men|for him)\b/.test(n) ||
      /\bhomme\b/.test(n) ||
      /\buomo\b/.test(n) ||
      /\bhombre\b/.test(n) ||
      /\bfor men\b/.test(n)) return 'masculine';
  // Feminine keywords
  if (/\b(pour femme|pour elle|for women|for her)\b/.test(n) ||
      /\bfemme\b/.test(n) ||
      /\bdonna\b/.test(n) ||
      /\bmujer\b/.test(n) ||
      /\bfor women\b/.test(n)) return 'feminine';
  return null; // unknown — must be set manually or via spreadsheet import
}

// TF-IDF-style tag weights: rarer tags count more.
let __TAG_IDF = null;
function getTagIdf(perfumes) {
  if (__TAG_IDF) return __TAG_IDF;
  const N = perfumes.length;
  const counts = {};
  perfumes.forEach(p => (p.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
  const idf = {};
  for (const t in counts) idf[t] = Math.log(N / counts[t]);
  __TAG_IDF = idf;
  return idf;
}

function similar(ref, safeOnly, perfumes) {
  if (!ref) return [];
  const idf = getTagIdf(perfumes);
  const refTags = new Set(ref.tags || []);
  const refPrimary = new Set(ref.primary || []);

  return perfumes
    .filter(p => p.id !== ref.id)
    .filter(p => !safeOnly || p.safeScore >= 7)
    .map(p => {
      const pTags = p.tags || [];
      let weighted = 0;
      let sharedCount = 0;
      let primaryShared = 0;
      for (const t of pTags) {
        if (refTags.has(t)) {
          const w = idf[t] || 0;
          weighted += w;
          sharedCount += 1;
          // Extra weight if both mark it primary
          if (refPrimary.has(t) && (p.primary || []).includes(t)) {
            weighted += w * 0.5;
            primaryShared += 1;
          }
        }
      }
      // Same mood bonus
      if (p.mood === ref.mood) weighted += 2;
      // Same broad family bonus (modest — redundant with tag overlap)
      const broadFams = ["floral","woody","citrus","amber","musk","resinous","gourmand","leather","aromatic","aquatic","chypre","fruity","green"];
      const refBroad = broadFams.filter(f => refTags.has(f));
      const pBroad = broadFams.filter(f => pTags.includes(f));
      if (refBroad.length && pBroad.length && refBroad.some(f => pBroad.includes(f))) {
        weighted += 1;
      }
      // Character profile similarity bonus (personality/intensity/balance scores)
      const sigDiff = Math.abs((p.sigScore||5) - (ref.sigScore||5));
      const intDiff = Math.abs((p.intScore||3) - (ref.intScore||3));
      const balDiff = Math.abs((p.balScore||5) - (ref.balScore||5));
      weighted += Math.max(0, 2 - (sigDiff + intDiff + balDiff) / 3);
      // Gender penalty: cross-gender (masc vs fem) pairs score much lower.
      // null/unisex on either side = no penalty.
      if (ref.gender && p.gender &&
          ref.gender !== 'unisex' && p.gender !== 'unisex' &&
          ref.gender !== p.gender) {
        weighted *= 0.2;
      }
      const sharedTags = pTags.filter(t => refTags.has(t));
      return { ...p, sim: weighted, sharedCount, primaryShared, sharedTags };
    })
    // Must share a meaningful score, at least 3 notes total, AND at least 1 primary note.
    // The primary-note requirement prevents "musk + woody + amber" coincidences
    // from counting as genuine similarity.
    .filter(p => p.sim >= 5 && p.sharedCount >= 3 && p.primaryShared >= 1)
    .sort((a,b) => b.sim - a.sim)
    .slice(0, 15);
}

// Wear history analytics
function computeWearStats(wearLog) {
  const stats = new Map();
  const now = new Date();
  for (const entry of wearLog) {
    const pid = entry.perfumeId;
    if (pid == null) continue;
    const cur = stats.get(pid) || { count: 0, lastWorn: null, ratings: [] };
    cur.count += 1;
    const d = new Date(entry.date);
    if (!cur.lastWorn || d > cur.lastWorn) cur.lastWorn = d;
    if (entry.rating != null && entry.rating !== "" && !isNaN(Number(entry.rating))) {
      cur.ratings.push({ date: d, rating: Number(entry.rating) });
    }
    stats.set(pid, cur);
  }
  for (const [, s] of stats) {
    s.daysAgo = Math.floor((now - s.lastWorn) / 86400000);
    s.ratings.sort((a, b) => a.date - b.date);
    s.latestRating = s.ratings.length ? s.ratings[s.ratings.length - 1].rating : null;
    s.firstRating = s.ratings.length ? s.ratings[0].rating : null;
    s.ratingDelta = (s.firstRating != null && s.latestRating != null) ? (s.latestRating - s.firstRating) : null;
  }
  return stats;
}

function enrich(perfumes, stats) {
  return perfumes.map(p => {
    const s = stats.get(p.id);
    const diaryRating = s?.latestRating;
    return {
      ...p,
      // Diary entries override the seed rating so a perfume's card reflects the latest verdict.
      rating: diaryRating != null ? diaryRating : p.rating,
      seedRating: p.rating,
      ratingHistory: s?.ratings || [],
      ratingDelta: s?.ratingDelta ?? null,
      wearCount: s?.count || 0,
      daysAgo: s?.daysAgo,
      isForgottenLove: !!(s && p.preference === "Love" && s.daysAgo > 30),
      isOverworn: !!(s && s.count >= 3 && s.daysAgo < 7),
    };
  });
}

// ─── DIARY → COLLECTION MATCHER ──────────────────────────────────────────────
// New diary entries arrive with just `house` and `perfume` strings. Match them
// to a perfume in the collection so that count + rating updates work.
function _norm(s) {
  return (s || "").toLowerCase().replace(/[^a-z0-9 ]+/g, ' ').replace(/\s+/g, ' ').trim();
}
// Strip trailing "/10" from ratings stored as strings (e.g. "8/10" → 8)
function normalizeWearEntry(entry) {
  if (!entry) return entry;
  const r = entry.rating;
  if (r == null || r === "") return entry;
  const cleaned = String(r).replace(/\/10$/i, "").trim();
  const num = parseFloat(cleaned);
  return isNaN(num) ? { ...entry, rating: null } : { ...entry, rating: num };
}

function attachPerfumeIdToEntry(entry, perfumes) {
  if (!entry || entry.perfumeId != null) return entry;
  if (!entry.perfume) return { ...entry, unmatched: true };
  const targetName = _norm(entry.perfume);
  const targetHouse = _norm(entry.house);
  // Strict: exact house + name
  let m = perfumes.find(p => _norm(p.name) === targetName && _norm(p.house) === targetHouse);
  if (m) return { ...entry, perfumeId: m.id, fuzzy: false, unmatched: false };
  // Loose: same name, any house
  m = perfumes.find(p => _norm(p.name) === targetName);
  if (m) return { ...entry, perfumeId: m.id, fuzzy: !!targetHouse && _norm(m.house) !== targetHouse, unmatched: false };
  // Fuzzy: substring match within same house
  if (targetHouse) {
    m = perfumes.find(p => _norm(p.house) === targetHouse && (_norm(p.name).includes(targetName) || targetName.includes(_norm(p.name))));
    if (m) return { ...entry, perfumeId: m.id, fuzzy: true, unmatched: false };
  }
  // Last resort: substring across collection
  m = perfumes.find(p => {
    const n = _norm(p.name);
    return n.length > 2 && targetName.length > 2 && (n.includes(targetName) || targetName.includes(n));
  });
  if (m) return { ...entry, perfumeId: m.id, fuzzy: true, unmatched: false };
  return { ...entry, perfumeId: null, unmatched: true };
}

  try { perfumeEdits = JSON.parse(localStorage.getItem("perfume_edits") || "{}"); } catch (e) {}

async function jsonbinPush(blob) {
  const binId = localStorage.getItem("cloud_bin_id");
  const apiKey = localStorage.getItem("cloud_api_key");
  if (!binId || !apiKey) return { ok: false, reason: "not-configured" };
  try {
    const res = await fetch(`${JSONBIN_BASE}/${binId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": apiKey,
        "X-Bin-Versioning": "false",
      },
      body: JSON.stringify(blob || _localStateBlob()),
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => "");
      return { ok: false, status: res.status, body: txt };
    }
    return { ok: true };
  } catch (e) { return { ok: false, error: String(e) }; }
}

async function jsonbinLoad() {
  const binId = localStorage.getItem("cloud_bin_id");
  const apiKey = localStorage.getItem("cloud_api_key");
  // Authenticated read (private bin)
  if (binId && apiKey) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/${binId}/latest`, {
        headers: { "X-Master-Key": apiKey, "X-Bin-Meta": "false" },
      });
      if (res.ok) {
        const json = await res.json();
        // Handle both raw data shape and wrapped {record: {...}} shape
        const data = (json && json.record && typeof json.record === "object") ? json.record : json;
        // Only return if it looks like app data (has at least one known key)
        if (data && (Array.isArray(data.wearLog) || Array.isArray(data.wishlist) || Array.isArray(data.userPerfumes) || data.perfumeEdits)) {
          return data;
        }
      }
    } catch (e) {}
  }
  // Public read fallback — uses CONFIG.publicBinId, no auth header required
  const pubId = (CONFIG.publicBinId || "").trim();
  if (pubId) {
    try {
      const res = await fetch(`${JSONBIN_BASE}/${pubId}/latest`, {
        headers: { "X-Bin-Meta": "false" },
      });
      if (res.ok) {
        const json = await res.json();
        const data = (json && json.record && typeof json.record === "object") ? json.record : json;
        if (data && (Array.isArray(data.wearLog) || Array.isArray(data.wishlist) || Array.isArray(data.userPerfumes) || data.perfumeEdits)) {
          return data;
        }
      }
    } catch (e) {}
  }
  return null;
}

// Legacy Google Sheets sync — kept for users who set this up earlier.
async function sheetsSync(action, data) {
  const url = localStorage.getItem("sheets_webhook_url");
  if (!url) return { ok: false };
  try {
    await fetch(url, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action, data }) });
    return { ok: true };
  } catch (e) { return { ok: false }; }
}

async function sheetsLoad() {
  const url = localStorage.getItem("sheets_webhook_url");
  if (!url) return null;
  try {
    const res = await fetch(url + "?action=load");
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

// Unified dispatchers used by the app.
async function cloudSync(action, data) {
  if (localStorage.getItem("cloud_bin_id") && localStorage.getItem("cloud_api_key")) {
    return jsonbinPush();
  }
  return sheetsSync(action, data);
}

async function cloudLoad() {
  // Always try jsonbinLoad first — it handles both authenticated reads
  // (when credentials are in localStorage) and public bin reads (CONFIG.publicBinId).
  // Only fall back to sheets if jsonbinLoad returns null.
  const binData = await jsonbinLoad();
  if (binData) return binData;
  return sheetsLoad();
}

function cloudConfigured() {
  return !!(localStorage.getItem("cloud_bin_id") && localStorage.getItem("cloud_api_key"))
      || !!localStorage.getItem("sheets_webhook_url")
      || !!(CONFIG.publicBinId && CONFIG.publicBinId.trim());
}

function normalizeTextForMatch(text) {
  // Replace hyphens and underscores with spaces, collapse whitespace, lowercase
  return (text || '').toLowerCase().replace(/[-_]/g, ' ').replace(/\s+/g, ' ');
}

function scoreNewPerfume({ notes, family, tags, myNotes, rating }) {
  const text = `${notes || ''} ${family || ''} ${(tags || []).join(' ')}`.toLowerCase();
  const mn = (myNotes || '').toLowerCase();
  const has = (...w) => w.some(x => text.includes(x));
  const hasMn = (...w) => w.some(x => mn.includes(x));

  let sig = 5;
  if (has('iris', 'orris')) sig += 2;
  if (has('violet')) sig += 2;
  if ((tags || []).includes('lipstick iris')) sig += 1;
  if (has('powder', 'powdery')) sig += 1;
  if (has('musk', 'ambrette', 'ambrox')) sig += 1;
  if (has(' tea', 'lapsang')) sig += 1;
  if (has('grapefruit', 'pomelo')) sig += 1;
  if (has('peach', 'osmanthus')) sig += 1;
  if (has('herbal', 'mint')) sig += 1;
  if (has('resin', 'incense')) sig += 1;
  if (has('marshmallow', 'caramel', 'gourmand', 'praline')) sig -= 2;
  if (hasMn('hate', 'scrub', 'disgusting', 'headache', 'nuclear', 'ick')) sig -= 3;
  if (rating != null && rating <= 3) sig -= 2;
  sig = Math.max(0, Math.min(10, sig));

  let intr = 3;
  if (has('incense', 'frankincense', 'olibanum')) intr += 2;
  if (has('smoke', 'smoky', 'tobacco')) intr += 2;
  if (has('suede', 'leather')) intr += 1;
  if (has('mineral', 'ozonic')) intr += 1;
  if (has('vetiver', 'carrot seed', 'cypriol')) intr += 1;
  if (has(' tea') && has('resin', 'incense', 'herbal')) intr += 1;
  if (has('iris') && has('musk', 'ambrox')) intr += 1;
  intr = Math.max(0, Math.min(10, intr));

  let trev = 5;
  if (has('grapefruit')) trev += 3;
  if (has('bergamot', 'pomelo', 'neroli', 'mandarin')) trev += 2;
  if (has('lemon', 'lime')) trev += 1;
  if (has('vetiver')) trev += 1;
  if (has('herbal', 'mint', 'aromatic')) trev += 1;
  if (has(' tea', 'lapsang')) trev += 1;
  if (has('marshmallow', 'caramel', 'gourmand', 'vanilla', 'sweet')) trev -= 2;
  if (has('powder', 'powdery')) trev -= 1;
  if (has('oud', 'agarwood')) trev -= 2;
  trev = Math.max(0, Math.min(10, trev));

  const bal = sig + Math.round(intr / 2);

  const airHits = [
    has(' tea', 'lapsang'),
    has('grapefruit', 'pomelo', 'bergamot', 'citrus'),
    has('peach', 'osmanthus'),
    has('herbal', 'mint'),
    has('musk') && !has('amber', 'incense'),
  ].filter(Boolean).length;
  const resHits = [
    has('resin', 'incense', 'frankincense', 'myrrh'),
    has('amber', 'labdanum'),
    has('vanilla') && !has('marshmallow'),
    has('smoke', 'smoky'),
  ].filter(Boolean).length;
  let mood;
  if (airHits >= 2 && resHits <= 1) mood = 'Air';
  else if (resHits >= 2 && airHits <= 1) mood = 'Resin';
  else if (airHits >= 1 && resHits >= 1) mood = 'Bridge';
  else mood = 'Classic';

  return { sigScore: sig, intScore: intr, balScore: bal, safeScore: trev, mood };
}

function prefFromRating(r) {
  if (r == null) return 'Unrated';
  if (r >= 9) return 'Love';
  if (r >= 8) return 'Like';
  if (r >= 6) return 'Neutral';
  return 'Dislike';
}

function Tag({ tag, sm, primary }) {
  const c = TAG_COLOR[tag] || "#999";
  return <span className="tag" style={{
    background: primary ? c + "25" : c + "18",
    color: c,
    borderColor: primary ? c + "80" : c + "35",
    borderWidth: primary ? "1.5px" : "1px",
    fontSize: sm ? 10 : 11,
    fontWeight: primary ? 500 : 400,
  }}>{tag}</span>;
}


function NoteFilter({ selected, onChange, primaryOnly, onPrimaryToggle, laneMode, onLaneModeChange }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState("");

  const toggle = (note) => {
    const lower = note.toLowerCase();
    if (selected.includes(lower)) onChange(selected.filter(s => s !== lower));
    else onChange([...selected, lower]);
  };

  const filterFn = (lane) => {
    if (!search) return true;
    return lane.toLowerCase().includes(search.toLowerCase());
  };

  const visibleGroups = NOTE_GROUPS.map(g => ({
    ...g,
    lanes: g.notes.filter(filterFn),
  })).filter(g => g.lanes.length > 0);

  return <div className="note-filter">
    <div className="note-filter-head" onClick={() => setOpen(o => !o)}>
      <span className="mini-lbl">Notes / Family</span>
      <span className="note-filter-summary">
        {selected.length === 0 ? "All" : selected.length === 1 ? selected[0] : `${selected.length} selected`}
        <span className="note-filter-chevron">{open ? "▴" : "▾"}</span>
      </span>
    </div>

    {selected.length > 0 && (
      <div className="selected-chips-row">
        {selected.map(s => (
          <button key={s} className="selected-chip" onClick={() => toggle(s)} title="Remove">
            {s} <span className="chip-x">×</span>
          </button>
        ))}
        {selected.length > 1 && (
          <button className="lane-mode-toggle" onClick={() => onLaneModeChange(laneMode === "all" ? "any" : "all")}>
            {laneMode === "all" ? "match ALL" : "match ANY"}
          </button>
        )}
        <button className="clear-all" onClick={() => onChange([])}>clear</button>
      </div>
    )}

    {open && (
      <div className="note-picker">
        <input
          className="note-picker-search"
          placeholder="Search notes…"
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        <div className="note-picker-options">
          <label className="note-picker-toggle">
            <input type="checkbox" checked={primaryOnly} onChange={e => onPrimaryToggle(e.target.checked)} />
            <span>Key notes only</span>
          </label>
        </div>
        {visibleGroups.map(g => (
          <div key={g.label} className="note-group">
            <div className="note-group-label">{g.label}</div>
            <div className="note-group-chips">
              {g.lanes.map(l => {
                const key = l.toLowerCase();
                const isActive = selected.includes(key);
                const color = TAG_COLOR[key] || "#999";
                return (
                  <button
                    key={l}
                    className={`pick-chip ${isActive ? "active" : ""}`}
                    onClick={() => toggle(l)}
                    style={isActive ? {
                      background: color + "25",
                      borderColor: color,
                      color: color,
                      fontWeight: 500,
                    } : {}}
                  >
                    {l}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
        {visibleGroups.length === 0 && <p className="empty" style={{padding: "20px 0"}}>No matching notes.</p>}
      </div>
    )}
  </div>;
}


function Bar({ v, max = 10, color = "#c8a97e" }) {
  return <div className="bar">
    <div className="bar-track"><div className="bar-fill" style={{ width: `${(v/max)*100}%`, background: color }} /></div>
    <span className="bar-val">{v}</span>
  </div>;
}

function fmtAge(daysAgo) {
  if (daysAgo == null) return null;
  if (daysAgo === 0) return "today";
  if (daysAgo === 1) return "yesterday";
  if (daysAgo < 7) return daysAgo + "d ago";
  if (daysAgo < 30) return Math.round(daysAgo / 7) + "w ago";
  if (daysAgo < 365) return Math.round(daysAgo / 30) + "mo ago";
  return Math.round(daysAgo / 365) + "y ago";
}

function PickView({ onSelect, wearStats, perfumes }) {
  const [family, setFamily] = useState("All");
  const [character, setCharacter] = useState("All");
  const [lanes, setLanes] = useState([]);
  const [laneMode, setLaneMode] = useState("all");
  const [trev, setTrev] = useState(false);
  const [primaryOnly, setPrimaryOnly] = useState(false);
  const [sort, setSort] = useState("smart");
  const [filtersOpen, setFiltersOpen] = useState(false);
  const [gender, setGender] = useState("All");

  const enriched = useMemo(() => enrich(perfumes, wearStats), [wearStats, perfumes]);

  const res = useMemo(() => {
    const filtered = enriched.filter(p => matches(p, { family, character, lanes, safeOnly: trev, excludeAvoid: true, triedOnly: false, search: "", pref: "All", primaryOnly, laneMode, gender }));
    if (sort === "smart") {
      return filtered.map(p => {
        let s = p.balScore;
        if (p.isForgottenLove) s += 4;
        if (p.isOverworn) s -= 6;
        if (p.preference === "Love") s += 2;
        if (p.daysAgo != null && p.daysAgo > 60 && p.rating >= 8) s += 2;
        return { ...p, smartScore: s };
      }).sort((a,b) => b.smartScore - a.smartScore).slice(0, 30);
    }
    return [...filtered].sort((a,b) => b[sort] - a[sort]).slice(0, 30);
  }, [enriched, family, character, lanes, trev, sort, primaryOnly, laneMode]);

  const forgottenCount = enriched.filter(p => p.isForgottenLove).length;

  return <div>
    <h1 className="page-title">Pick For Me</h1>
    <p className="page-sub">Smart rotation: forgotten loves boosted, recently worn downranked.</p>

    {forgottenCount > 0 && sort === "smart" && (
      <div className="banner">
        <strong>{forgottenCount} forgotten love{forgottenCount === 1 ? "" : "s"}</strong> — fragrances rated 9+ you haven't worn in 30+ days are boosted below.
      </div>
    )}

    <button className="filter-toggle" onClick={() => setFiltersOpen(f => !f)}>
      {filtersOpen ? "Hide" : "Show"} Filters
      <span className="filter-summary">{gender !== "All" && gender} {family !== "All" && family} {character !== "All" && character} {lanes.length > 0 && (lanes.length === 1 ? lanes[0] : `${lanes.length} notes`)} {primaryOnly && "· primary"} {trev && ((CONFIG.partnerName || "Partner") + " ✓")}</span>
    </button>

    <div className={`filter-panel ${filtersOpen ? "open" : ""}`}>
      <label><span className="mini-lbl">Gender</span><select value={gender} onChange={e => setGender(e.target.value)}><option value="All">All</option><option value="feminine">Feminine</option><option value="masculine">Masculine</option><option value="unisex">Unisex</option></select></label>
      <label><span className="mini-lbl">Family</span><select value={family} onChange={e => setFamily(e.target.value)}>{FAMILY_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}</select></label>
      <label><span className="mini-lbl">Character</span><select value={character} onChange={e => setCharacter(e.target.value)}>{CHARACTER_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}</select></label>
      <button onClick={() => { setGender("All"); setFamily("All"); setCharacter("All"); setLanes([]); setPrimaryOnly(false); setTrev(false); }} style={{gridColumn:"1/-1",background:"none",border:"1px solid #ddd",borderRadius:8,padding:"8px",fontSize:12,color:"#999",cursor:"pointer",marginTop:4}}>Clear all filters</button>
      <div className="lane-filter-wrap">
        <NoteFilter
          selected={lanes}
          onChange={setLanes}
          primaryOnly={primaryOnly}
          onPrimaryToggle={setPrimaryOnly}
          laneMode={laneMode}
          onLaneModeChange={setLaneMode}
        />
      </div>
      <label><span className="mini-lbl">Sort</span><select value={sort} onChange={e => setSort(e.target.value)}>
        <option value="smart">Smart (recommended)</option>
        <option value="balScore">Appeal</option>
        <option value="sigScore">Match</option>
        <option value="intScore">Edge</option>
        <option value="safeScore">{CONFIG.partnerName || "Partner"}</option>
        <option value="rating">My Rating</option>
      </select></label>
      <button className={`toggle ${trev ? "active" : ""}`} onClick={() => setTrev(t => !t)}>{(CONFIG.partnerName || "Partner") + " ✓"}</button>
    </div>

    <div className="result-count">
      {res.length} result{res.length !== 1 ? "s" : ""}
      {res.length === 0 && <span className="warn"> — broaden filters</span>}
    </div>

    <div className="grid">
      {res.map((p, i) => {
        let annotation = null;
        if (p.isForgottenLove) annotation = "↩ Forgotten Love";
        else if (p.isOverworn) annotation = "Recently worn";
        else if (i === 0) annotation = "Top Pick";
        return <Card key={p.id} p={p} onClick={onSelect} annotation={annotation} />;
      })}
    </div>
  </div>;
}

      <label><span className="mini-lbl">Preference</span><select value={pref} onChange={e => setPref(e.target.value)}>{PREFS.map(p => <option key={p}>{p}</option>)}</select></label>
      <button onClick={() => { setGender("All"); setPref("All"); setFamily("All"); setCharacter("All"); setLanes([]); setPrimaryOnly(false); setTriedOnly(false); }} style={{gridColumn:"1/-1",background:"none",border:"1px solid #ddd",borderRadius:8,padding:"8px",fontSize:12,color:"#999",cursor:"pointer",marginTop:4}}>Clear all filters</button>
      <label><span className="mini-lbl">Family</span><select value={family} onChange={e => setFamily(e.target.value)}>{FAMILY_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}</select></label>
      <label><span className="mini-lbl">Character</span><select value={character} onChange={e => setCharacter(e.target.value)}>{CHARACTER_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}</select></label>
      <div className="lane-filter-wrap">
        <NoteFilter
          selected={lanes}
          onChange={setLanes}
          primaryOnly={primaryOnly}
          onPrimaryToggle={setPrimaryOnly}
          laneMode={laneMode}
          onLaneModeChange={setLaneMode}
        />
      </div>
      <label><span className="mini-lbl">Sort</span><select value={sort} onChange={e => setSort(e.target.value)}>
        <option value="balScore">By Appeal</option>
        <option value="sigScore">By Match</option>
        <option value="rating">By Rating</option>
        <option value="house">By House</option>
        <option value="name">By Name</option>
      </select></label>
      <button className={`toggle ${triedOnly ? "active" : ""}`} onClick={() => setTriedOnly(t => !t)}>Tried Only</button>
      
    </div>

    <div className="result-count">{res.length} fragrance{res.length !== 1 ? "s" : ""}</div>
    <div className="grid">{res.map(p => <Card key={p.id} p={p} onClick={onSelect} />)}</div>
  </div>;
}

function SurpriseView({ onSelect, perfumes }) {
  const [pick, setPick] = useState(null);
  const [mode, setMode] = useState("loves");

  const pool = useMemo(() => {
    if (mode === "loves") return perfumes.filter(p => p.preference === "Love");
    if (mode === "tried") return perfumes.filter(p => p.tried && p.status !== "Avoid" && p.status !== "Dislike");
    return perfumes.filter(p => p.status !== "Avoid");
  }, [mode, perfumes]);

  const surprise = () => setPick(pool[Math.floor(Math.random() * pool.length)]);
  useEffect(() => { surprise(); }, [mode]);

  return <div>
    <h1 className="page-title">Surprise Me</h1>
    <p className="page-sub">Can't decide. One tap, out the door.</p>

    <div className="chip-row mode-row">
      {[["loves","From my loves"],["tried","Anything tried"],["all","Wildcard"]].map(([k,l]) =>
        <button key={k} className={`chip ${mode === k ? "active" : ""}`} onClick={() => setMode(k)}>{l}</button>
      )}
    </div>

    {pick && (
      <div className="surprise-card">
        <div className="surprise-label">Today's Pick</div>
        <div className="surprise-house">{pick.house}</div>
        <h2 className="surprise-name">{pick.name}</h2>
        {pick.concentration && <div className="surprise-conc">{pick.concentration}</div>}
        <div className="tag-row centered">{pick.tags.map(t => <Tag key={t} tag={t} />)}</div>
        {pick.myNotes && <p className="surprise-quote">"{pick.myNotes}"</p>}
        {pick.rating != null && <div className="surprise-rating" style={{ color: pick.rating >= 9 ? "#c8a97e" : pick.rating >= 8 ? "#8aaa80" : "#999" }}>{pick.rating}<span className="rating-of">/10</span></div>}
        <div className="surprise-actions">
          <button className="btn-primary" onClick={surprise}>↻ Again</button>
          <button className="btn-ghost" onClick={() => onSelect(pick)}>Details</button>
        </div>
      </div>
    )}
  </div>;
}

function simLabel(score) {
  if (score >= 14) return "Very close";
  if (score >= 10) return "Close";
  if (score >= 7)  return "Related";
  return "Loosely related";
}

function SimilarView({ onSelect, perfumes }) {
  const [refId, setRefId] = useState(null);
  const [query, setQuery] = useState("");
  const [trevOnly, setTrevOnly] = useState(false);
  const [genderFilter, setGenderFilter] = useState("All");
  const [mode, setMode] = useState("perfume"); // "perfume" | "note"
  const [noteQuery, setNoteQuery] = useState("");

  const ref = refId ? perfumes.find(p => p.id === refId) : null;
  const results = useMemo(() => similar(ref, trevOnly, perfumes), [ref, trevOnly, perfumes]);

  // Note-search mode: collect all unique tags, filter by query, show perfumes
  const allTags = useMemo(() => {
    const tagSet = new Set();
    perfumes.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
    return [...tagSet].sort();
  }, [perfumes]);

  const matchedTags = useMemo(() => {
    const q = noteQuery.toLowerCase().trim();
    return q ? allTags.filter(t => t.includes(q)) : [];
  }, [noteQuery, allTags]);

  const selectedTag = matchedTags.length === 1 ? matchedTags[0] : allTags.find(t => t === noteQuery.toLowerCase().trim()) || null;

  const noteResults = useMemo(() => {
    if (!selectedTag) return [];
    const primary = perfumes.filter(p => (p.primary || []).includes(selectedTag));
    const secondary = perfumes.filter(p => !primary.includes(p) && (p.tags || []).includes(selectedTag));
    return [...primary.map(p => ({...p, _isPrimary: true})), ...secondary.map(p => ({...p, _isPrimary: false}))];
  }, [selectedTag, perfumes]);

  // Perfume-mode selector: filter by query + gender
  const choices = useMemo(() => {
    const q = query.toLowerCase().trim();
    return perfumes
      .filter(p => !q || p.fullName.toLowerCase().includes(q))
      .filter(p => genderFilter === "All" || p.gender === genderFilter)
      .sort((a,b) => a.fullName.localeCompare(b.fullName));
  }, [perfumes, query, genderFilter]);

  return <div>
    <h2 className="section-title">Find Similar</h2>

    {/* Mode toggle */}
    <div className="inline-row" style={{marginBottom:12}}>
      <button className={`tab ${mode==="perfume"?"active":""}`} style={{flex:1}} onClick={()=>setMode("perfume")}>By Perfume</button>
      <button className={`tab ${mode==="note"?"active":""}`} style={{flex:1}} onClick={()=>setMode("note")}>By Note</button>
    </div>

    {mode === "note" ? <>
      <input type="search" placeholder="Type a note (e.g. iris, oud, vetiver)…" value={noteQuery} onChange={e=>setNoteQuery(e.target.value)} style={{width:"100%",marginBottom:8,boxSizing:"border-box"}} />
      {noteQuery && matchedTags.length > 0 && !selectedTag && <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {matchedTags.slice(0,12).map(t => <button key={t} onClick={()=>setNoteQuery(t)} style={{padding:"4px 10px",fontSize:12,border:"1px solid #ddd",borderRadius:8,background:"#faf9f7",cursor:"pointer"}}>{t}</button>)}
      </div>}
      {selectedTag && <div className="sec-lbl" style={{marginBottom:10}}>Perfumes featuring <strong>{selectedTag}</strong> — {noteResults.filter(p=>p._isPrimary).length} primary, {noteResults.filter(p=>!p._isPrimary).length} secondary</div>}
      {selectedTag && noteResults.length === 0 && <p className="empty">No perfumes found with that note.</p>}
      <div className="grid">
        {noteResults.map(p => <Card key={p.id} p={p} onClick={()=>onSelect(p)} annotation={p._isPrimary ? <span style={{fontSize:11,color:"#c8a97e",fontWeight:600}}>● Primary note</span> : <span style={{fontSize:11,color:"#aaa"}}>○ Also present</span>} />)}
      </div>
    </> : <>
    <div className="inline-row" style={{marginBottom:8}}>
      <input type="search" placeholder="Filter perfumes…" value={query} onChange={e=>setQuery(e.target.value)} style={{flex:1}} />
      <button className={`toggle ${trevOnly?'active':''}`} onClick={()=>setTrevOnly(t=>!t)}>{(CONFIG.partnerName||'Partner')+' ✓'}</button>
    </div>
    <div className="inline-row" style={{marginBottom:10,gap:4}}>
      {["All","feminine","masculine","unisex"].map(g => <button key={g} className={`tab ${genderFilter===g?"active":""}`} style={{flex:1,padding:"6px 4px",fontSize:11}} onClick={()=>setGenderFilter(g)}>{g==="All"?"All genders":g==="feminine"?"Feminine":g==="masculine"?"Masculine":"Unisex"}</button>)}
    </div>
    <select value={refId||''} onChange={e=>setRefId(parseInt(e.target.value)||null)} style={{width:'100%',marginBottom:14,padding:'10px 14px',fontSize:14,fontFamily:'inherit',border:'1px solid #ddd',background:'#fff',minHeight:44}}>
      <option value="">— Pick a reference perfume ({choices.length}) —</option>
      {choices.map(p => <option key={p.id} value={p.id}>{p.fullName}</option>)}
    </select>

    {ref && (() => {
      const refPrims = new Set(ref.primary || []);
      return <div style={{background:"#faf9f7",border:"1px solid #e8e2da",borderRadius:12,padding:"14px 16px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div className="card-house" style={{marginBottom:2}}>{ref.house}</div>
            <div style={{fontSize:16,fontWeight:600,color:"#2d2926"}}>{ref.name}{ref.concentration ? " — " + ref.concentration : ""}</div>
            <div style={{fontSize:12,color:"#999",marginTop:3}}>{ref.family}</div>
          </div>
          <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
            {ref.rating != null && <span className="card-rating" style={{color:ref.rating>=9?"#c8a97e":ref.rating>=8?"#8aaa80":"#999"}}>{ref.rating}/10</span>}
            {ref.gender && <span style={{fontSize:11,fontWeight:600,letterSpacing:"0.05em",padding:"3px 8px",borderRadius:10,textTransform:"uppercase",background:ref.gender==="feminine"?"#f3e6f0":ref.gender==="masculine"?"#e6edf8":"#eef3e6",color:ref.gender==="feminine"?"#9b5f8a":ref.gender==="masculine"?"#4a6fa5":"#5a7a4a"}}>{ref.gender}</span>}
          </div>
        </div>
        <div className="tag-row" style={{marginBottom:0}}>
          {ref.tags.map(t => <Tag key={t} tag={t} primary={refPrims.has(t)} />)}
        </div>
      </div>;
    })()}

    {ref && results.length === 0 && <p className="empty">No strong matches. Try a different reference.</p>}
    {ref && results.length > 0 && <div className="sec-lbl" style={{marginBottom:10}}>Most similar to {ref.fullName}</div>}
    <div className="grid">
      {results.map(p => {
        const refPrims = new Set(ref ? (ref.primary || []) : []);
        const matchedPrims = (p.sharedTags || []).filter(t => refPrims.has(t));
        const label = simLabel(p.sim);
        const annotation = <div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:5}}><span style={{color:p.sim>=14?"#c8a97e":p.sim>=10?"#8aaa80":"#aaa",fontWeight:p.sim>=10?600:400}}>{label}</span> · {p.sharedCount} shared{matchedPrims.length > 0 ? ` · ${matchedPrims.length} primary` : ""}</div>
          {p.sharedTags && p.sharedTags.length > 0 && <div className="tag-row" style={{marginBottom:0,flexWrap:"wrap"}}>
            {p.sharedTags.map(t => <span key={t} style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:refPrims.has(t)?"#c8a97e22":"#f0ece6",color:refPrims.has(t)?"#8b6f3e":"#7a6a5a",border:refPrims.has(t)?"1px solid #c8a97e66":"1px solid transparent",fontWeight:refPrims.has(t)?600:400}}>{t}</span>)}
          </div>}
        </div>;
        return <Card key={p.id} p={p} onClick={()=>onSelect(p)} annotation={annotation} />;
      })}
    </div>
    </>}
  </div>;
}

function CompareView({ perfumes }) {
  const [idA, setIdA] = useState(null);
  const [idB, setIdB] = useState(null);
  const [queryA, setQueryA] = useState("");
  const [queryB, setQueryB] = useState("");

  const a = idA ? perfumes.find(p => p.id === idA) : null;
  const b = idB ? perfumes.find(p => p.id === idB) : null;

  const filtered = (q) => {
    const lower = q.toLowerCase().trim();
    return perfumes
      .filter(p => !lower || p.fullName.toLowerCase().includes(lower))
      .sort((x, y) => x.fullName.localeCompare(y.fullName));
  };

  // Compute shared/unique note sets
  const { sharedTags, onlyA, onlyB, sharedPrimary } = useMemo(() => {
    if (!a || !b) return { sharedTags: new Set(), onlyA: [], onlyB: [], sharedPrimary: new Set() };
    const tagsA = new Set(a.tags || []);
    const tagsB = new Set(b.tags || []);
    const primA = new Set(a.primary || []);
    const primB = new Set(b.primary || []);
    const shared = new Set([...tagsA].filter(t => tagsB.has(t)));
    const sharedPrim = new Set([...shared].filter(t => primA.has(t) && primB.has(t)));
    const uniqA = [...tagsA].filter(t => !tagsB.has(t));
    const uniqB = [...tagsB].filter(t => !tagsA.has(t));
    return { sharedTags: shared, onlyA: uniqA, onlyB: uniqB, sharedPrimary: sharedPrim };
  }, [a, b]);

  const tagStyle = (tag, pref) => {
    const isPrim = (pref?.primary || []).includes(tag);
    const isShared = sharedTags.has(tag);
    const isBothPrim = sharedPrimary.has(tag);
    if (isBothPrim) return { background: "#c8a97e", color: "#fff", border: "none", fontWeight: 700 };
    if (isShared && isPrim) return { background: "#c8a97e44", color: "#8b6f3e", border: "1px solid #c8a97e99", fontWeight: 600 };
    if (isShared) return { background: "#e8f0e8", color: "#4a6a4a", border: "1px solid #aaccaa" };
    if (isPrim) return { background: "#f5f0e8", color: "#8b6f3e", border: "1px solid #d4bc8a", fontWeight: 600 };
    return { background: "#f0ece6", color: "#888", border: "1px solid transparent" };
  };

  const genderStyle = (g) => ({
    fontSize: 11, fontWeight: 600, letterSpacing: "0.05em", padding: "2px 8px",
    borderRadius: 10, textTransform: "uppercase",
    background: g === "feminine" ? "#f3e6f0" : g === "masculine" ? "#e6edf8" : "#eef3e6",
    color: g === "feminine" ? "#9b5f8a" : g === "masculine" ? "#4a6fa5" : "#5a7a4a"
  });

  const scoreDiff = (a && b) ? {
    sig: (a.sigScore || 5) - (b.sigScore || 5),
    int: (a.intScore || 3) - (b.intScore || 3),
    bal: (a.balScore || 5) - (b.balScore || 5),
  } : null;

  const ScoreBar = ({ label, valA, valB, max = 10 }) => {
    const diff = Math.abs(valA - valB);
    return <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#999", marginBottom: 3 }}>
        <span style={{ fontWeight: 600, color: "#555" }}>{valA}</span>
        <span style={{ color: "#bbb" }}>{label}</span>
        <span style={{ fontWeight: 600, color: "#555" }}>{valB}</span>
      </div>
      <div style={{ display: "flex", height: 6, borderRadius: 3, overflow: "hidden", background: "#f0ece6" }}>
        <div style={{ width: `${(valA / max) * 50}%`, background: "#c8a97e", marginLeft: "auto" }} />
        <div style={{ width: 2, background: "#fff" }} />
        <div style={{ width: `${(valB / max) * 50}%`, background: "#8aaa80" }} />
      </div>
    </div>;
  };

  const PerfumePanel = ({ p, side }) => {
    if (!p) return <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#ccc", fontSize: 14, padding: 24 }}>
      Pick a perfume
    </div>;

    const allTags = p.tags || [];
    const prims = new Set(p.primary || []);

    return <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ marginBottom: 12 }}>
        <div className="card-house">{p.house}</div>
        <div style={{ fontSize: 17, fontWeight: 700, color: "#2d2926", lineHeight: 1.2, marginBottom: 4 }}>
          {p.name}{p.concentration ? <span style={{ fontWeight: 400, color: "#888", fontSize: 14 }}> {p.concentration}</span> : ""}
        </div>
        <div style={{ fontSize: 12, color: "#aaa", marginBottom: 6 }}>{p.family}</div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
          {p.gender && <span style={genderStyle(p.gender)}>{p.gender}</span>}
          {p.rating != null && <span style={{ fontSize: 13, fontWeight: 600, color: p.rating >= 9 ? "#c8a97e" : p.rating >= 8 ? "#8aaa80" : "#999" }}>{p.rating}/10</span>}
          {p.preference && p.preference !== "Unrated" && <span style={{ fontSize: 11, color: "#aaa" }}>{p.preference}</span>}
        </div>
      </div>

      {/* Mood + wear */}
      <div style={{ fontSize: 11, color: "#bbb", marginBottom: 10, display: "flex", gap: 10 }}>
        {p.wearCount > 0 && <span>Worn {p.wearCount}×</span>}
        {p.daysAgo != null && <span>{fmtAge(p.daysAgo)}</span>}
      </div>

      {/* Notes */}
      {allTags.length > 0 && <div className="tag-row" style={{ flexWrap: "wrap" }}>
        {/* Primary notes first */}
        {[...allTags].sort((x, y) => {
          const xp = prims.has(x), yp = prims.has(y);
          const xs = sharedTags.has(x), ys = sharedTags.has(y);
          if (xp && yp) return 0;
          if (xp) return -1; if (yp) return 1;
          if (xs && ys) return 0;
          if (xs) return -1; if (ys) return 1;
          return 0;
        }).map(t => <span key={t} style={{ fontSize: 11, padding: "3px 8px", borderRadius: 8, display: "inline-block", margin: "2px", ...tagStyle(t, p) }}>{t}</span>)}
      </div>}
    </div>;
  };

  return <div>
    <h1 className="page-title">Compare</h1>
    <p className="page-sub">Side-by-side note breakdown. Shared notes are highlighted.</p>

    {/* Selectors */}
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
      <div>
        <input type="search" placeholder="Search A…" value={queryA} onChange={e => setQueryA(e.target.value)} style={{ width: "100%", marginBottom: 6, boxSizing: "border-box" }} />
        <select value={idA || ""} onChange={e => setIdA(parseInt(e.target.value) || null)} style={{ width: "100%", padding: "10px 12px", fontSize: 13, fontFamily: "inherit", border: "1px solid #ddd", background: "#fff", minHeight: 44, boxSizing: "border-box" }}>
          <option value="">— Perfume A —</option>
          {filtered(queryA).map(p => <option key={p.id} value={p.id}>{p.fullName}</option>)}
        </select>
      </div>
      <div>
        <input type="search" placeholder="Search B…" value={queryB} onChange={e => setQueryB(e.target.value)} style={{ width: "100%", marginBottom: 6, boxSizing: "border-box" }} />
        <select value={idB || ""} onChange={e => setIdB(parseInt(e.target.value) || null)} style={{ width: "100%", padding: "10px 12px", fontSize: 13, fontFamily: "inherit", border: "1px solid #ddd", background: "#fff", minHeight: 44, boxSizing: "border-box" }}>
          <option value="">— Perfume B —</option>
          {filtered(queryB).map(p => <option key={p.id} value={p.id}>{p.fullName}</option>)}
        </select>
      </div>
    </div>

    {/* Legend */}
    {a && b && <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16, fontSize: 11 }}>
      <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ width: 12, height: 12, borderRadius: 3, background: "#c8a97e", display: "inline-block" }} /> Primary in both
      </span>
      <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ width: 12, height: 12, borderRadius: 3, background: "#e8f0e8", border: "1px solid #aaccaa", display: "inline-block" }} /> Shared note
      </span>
      <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ width: 12, height: 12, borderRadius: 3, background: "#f5f0e8", border: "1px solid #d4bc8a", display: "inline-block" }} /> Primary (one side)
      </span>
      <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ width: 12, height: 12, borderRadius: 3, background: "#f0ece6", display: "inline-block" }} /> Unique note
      </span>
    </div>}

    {/* Side by side panels */}
    <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
      <PerfumePanel p={a} side="a" />
      {a && b && <div style={{ width: 1, background: "#e8e2da", flexShrink: 0, alignSelf: "stretch" }} />}
      <PerfumePanel p={b} side="b" />
    </div>

    {/* Summary stats */}
    {a && b && <div style={{ marginTop: 24, padding: "16px", background: "#faf9f7", border: "1px solid #e8e2da", borderRadius: 12 }}>
      <div className="sec-lbl" style={{ marginBottom: 12 }}>Comparison summary</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, textAlign: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#c8a97e" }}>{sharedTags.size}</div>
          <div style={{ fontSize: 11, color: "#aaa" }}>shared notes</div>
        </div>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#8b6f3e" }}>{sharedPrimary.size}</div>
          <div style={{ fontSize: 11, color: "#aaa" }}>shared primaries</div>
        </div>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#999" }}>{onlyA.length + onlyB.length}</div>
          <div style={{ fontSize: 11, color: "#aaa" }}>unique notes total</div>
        </div>
      </div>

      {/* Character score comparison */}
      <ScoreBar label="Match" valA={a.sigScore || 5} valB={b.sigScore || 5} />
      <ScoreBar label="Intensity" valA={a.intScore || 3} valB={b.intScore || 3} />
      <ScoreBar label="Appeal" valA={a.balScore || 5} valB={b.balScore || 5} />

      {/* Notes only in A */}
      {onlyA.length > 0 && <div style={{ marginTop: 12 }}>
        <div style={{ fontSize: 11, color: "#aaa", marginBottom: 4 }}>Only in {a.name}</div>
        <div className="tag-row" style={{ flexWrap: "wrap" }}>

// ─── DIARY MARKDOWN PARSER ────────────────────────────────────────────────────
// Accepts two formats:
//   1. JSON backup ({"diary":[...],"wishlist":[...]}) — merges diary into wearLog
//   2. Markdown diary in the form:
//        ## YYYY-MM-DD [– House – Perfume]
//        **Perfume:** Name        (or bare line after heading)
//        **House:** Name
//        **Rating:** 8.5
//        **Notes:** free text...
//        **Partner:** positive/negative/—
function parseDiaryMarkdown(text) {
  // Try JSON first
  const trimmed = text.trim();
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try {
      const parsed = JSON.parse(trimmed);
      // {diary:[...]} shape
      if (parsed.diary && Array.isArray(parsed.diary)) return parsed.diary;
      // plain array of entries
      if (Array.isArray(parsed)) return parsed;
    } catch (e) {}
  }

  // Parse markdown
  const entries = [];
  const lines = text.split(/\r?\n/);
  let current = null;
  const flush = () => { if (current && current.perfume && current.date) entries.push(current); };

  for (let raw of lines) {
    const line = raw.trim();

    // New entry: ## YYYY-MM-DD or ## YYYY-MM-DD – House – Perfume
    const headingMatch = line.match(/^##\s+(\d{4}-\d{2}-\d{2})(.*)?$/);
    if (headingMatch) {
      flush();
      const date = headingMatch[1];
      const rest = (headingMatch[2] || "").replace(/^[\s–—-]+/, "").trim();
      // rest might be "House – Perfume" or just "Perfume" or empty
      const parts = rest.split(/\s*[–—]\s*/);
      current = { date };
      if (parts.length >= 2) { current.house = parts[0]; current.perfume = parts.slice(1).join(" — "); }
      else if (parts.length === 1 && parts[0]) { current.perfume = parts[0]; }
      continue;
    }
    if (!current) continue;

    // Field lines: **Field:** value or *Field:* value
    const fieldMatch = line.match(/^\*{1,2}([^*:]+?)\*{0,2}:\*{0,2}\s*(.*)$/);
    if (fieldMatch) {
      const key = fieldMatch[1].trim().toLowerCase();
      const val = fieldMatch[2].trim();
      if (key === "perfume" || key === "name") current.perfume = val;
      else if (key === "house") current.house = val;
      else if (key === "concentration" || key === "conc") current.concentration = val;
      else if (key === "rating") {
        const n = parseFloat(val.replace(/\/\d+/, ""));
        if (!isNaN(n)) current.rating = n;
      }
      else if (key === "notes" || key === "note") current.notes = val;
      else if (key === "partner" || key === "reaction" || key === "safe" || key === "trev") current.safeReaction = val;
    }
    // Append continuation lines to notes (non-empty, non-heading, non-field)
    else if (line && !line.startsWith("#") && current.notes !== undefined) {
      current.notes += " " + line;
    }
  }
  flush();
  return entries;
}

function MarkdownImport({ onImported }) {
  const [status, setStatus] = useState("");
  const [importing, setImporting] = useState(false);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true); setStatus("");
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const entries = parseDiaryMarkdown(ev.target.result);
        if (!entries.length) { setStatus("✗ No diary entries found. Check the file format."); setImporting(false); return; }
        // Merge into localStorage wear log (dedup by date+perfume)
        let existing = [];
        try { existing = JSON.parse(localStorage.getItem("perfume_diary") || "[]"); } catch (_) {}
        const existingKeys = new Set(existing.map(e => `${e.date}|${(e.perfume||"").toLowerCase()}`));
        const newEntries = entries.filter(e => !existingKeys.has(`${e.date}|${(e.perfume||"").toLowerCase()}`));
        const merged = [...existing, ...newEntries];
        localStorage.setItem("perfume_diary", JSON.stringify(merged));
        // Push to cloud so other browsers/devices see the import immediately
        const cloudOk = await jsonbinPush();
        const cloudNote = cloudOk?.ok ? " Pushed to cloud." : "";
        setStatus(`✓ Imported ${newEntries.length} new entries (${entries.length - newEntries.length} duplicates skipped).${cloudNote}`);
        if (onImported) onImported();
      } catch (err) {
        setStatus(`✗ Parse error: ${err.message}`);
      }
      setImporting(false);
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  return <div>
    <div className="mini-lbl" style={{marginBottom:8}}>Import Diary (Markdown or JSON backup)</div>
    <p style={{fontSize:12,color:"var(--fg-soft)",marginBottom:10,fontStyle:"italic"}}>Accepts the JSON backup file, or a Markdown diary with <code style={{background:"var(--bg-soft)",padding:"1px 4px"}}>## YYYY-MM-DD</code> headings and <code style={{background:"var(--bg-soft)",padding:"1px 4px"}}>**Field:** value</code> fields. Duplicates are skipped.</p>
    <label style={{display:"inline-block",cursor:"pointer"}}>
      <span className="btn-ghost" style={{display:"inline-block",pointerEvents:"none"}}>{importing ? "Importing…" : "Choose File"}</span>
      <input type="file" accept=".md,.txt,.json" onChange={handleFile} style={{display:"none"}} />
    </label>
    {status && <div className={`test-result ${status.startsWith("✓") ? "ok" : status.startsWith("✗") ? "fail" : ""}`} style={{marginTop:10}}>{status}</div>}
  </div>;
}

  return <div>

      <div className="form-grid" style={{marginBottom:14}}>

      </div>
      {binResult && <div className={`test-result ${binResult.startsWith("✓") ? "ok" : binResult.startsWith("✗") ? "fail" : ""}`}>{binResult}</div>}

// ─── WHAT TO WEAR TODAY ───────────────────────────────────────────────────────
const SEASONS = ["Spring","Summer","Autumn","Winter"];
const OCCASIONS = ["Casual","Work","Evening","Date Night","Outdoors","Weekend"];
const VIBES = ["Fresh","Cozy","Romantic","Bold","Soft","Energizing"];

function contextScore(p, { season, occasion, vibe }) {
  const tags = new Set((p.tags || []).map(t => t.toLowerCase()));
  const family = (p.family || "").toLowerCase();
  let bonus = 0;

  // Season
  if (season === "Spring") {
    if (tags.has("floral") || tags.has("violet") || tags.has("iris") || tags.has("rose") ||
        tags.has("green") || tags.has("citrus") || tags.has("cherry blossom") || tags.has("lily of the valley")) bonus += 3;
    if (p.mood === "Air") bonus += 1;
  } else if (season === "Summer") {
    if (tags.has("citrus") || tags.has("aquatic") || tags.has("mint") || tags.has("herbal fresh") ||
        tags.has("grapefruit") || tags.has("bergamot") || tags.has("lemon") || tags.has("green")) bonus += 3;
    if (p.mood === "Air") bonus += 2;
    if (tags.has("resinous") || tags.has("oud") || tags.has("leather") || tags.has("smoky")) bonus -= 2;
  } else if (season === "Autumn") {
    if (tags.has("woody") || tags.has("resinous") || tags.has("amber") || tags.has("spicy") ||
        tags.has("leather") || tags.has("vetiver") || tags.has("patchouli") || tags.has("tobacco")) bonus += 3;
    if (p.mood === "Resin" || p.mood === "Classic") bonus += 1;
  } else if (season === "Winter") {
    if (tags.has("resinous") || tags.has("gourmand") || tags.has("vanilla") || tags.has("musk") ||
        tags.has("oud") || tags.has("amber") || tags.has("smoky") || tags.has("incense")) bonus += 3;
    if (p.mood === "Resin") bonus += 2;
    if (tags.has("citrus") || tags.has("aquatic")) bonus -= 1;
  }

  // Occasion
  if (occasion === "Work") {
    bonus += Math.min(p.sigScore || 0, 7) * 0.3;
    if ((p.intScore || 0) > 8) bonus -= 2; // too loud
    if (tags.has("smoky") || tags.has("tobacco") || tags.has("oud")) bonus -= 1;
  } else if (occasion === "Evening") {
    bonus += (p.intScore || 0) * 0.3;
    if (p.mood === "Resin" || p.mood === "Classic") bonus += 2;
  } else if (occasion === "Date Night") {
    bonus += (p.safeScore || 0) * 0.4;
    if (tags.has("rose") || tags.has("jasmine") || tags.has("musk") || tags.has("gardenia")) bonus += 2;
    if (tags.has("vanilla") || tags.has("tonka")) bonus += 1;
  } else if (occasion === "Outdoors") {
    if (tags.has("citrus") || tags.has("green") || tags.has("herbal fresh") || tags.has("mint") ||
        tags.has("aquatic") || tags.has("bergamot")) bonus += 3;
    if (p.mood === "Air") bonus += 2;
  } else if (occasion === "Weekend") {
    bonus += (p.balScore || 0) * 0.2;
  } else if (occasion === "Casual") {
    bonus += (p.balScore || 0) * 0.15;
    if (tags.has("musk") || tags.has("sandalwood") || tags.has("cedar")) bonus += 1;
  }

  // Vibe
  if (vibe === "Fresh") {
    if (tags.has("citrus") || tags.has("mint") || tags.has("green") || tags.has("aquatic") || tags.has("herbal fresh")) bonus += 3;
  } else if (vibe === "Cozy") {
    if (tags.has("vanilla") || tags.has("tonka") || tags.has("amber") || tags.has("resinous") ||
        tags.has("sandalwood") || tags.has("honey") || tags.has("cream")) bonus += 3;
  } else if (vibe === "Romantic") {
    if (tags.has("rose") || tags.has("jasmine") || tags.has("musk") || tags.has("gardenia") ||
        tags.has("peony") || tags.has("iris")) bonus += 3;
    bonus += (p.safeScore || 0) * 0.2;
  } else if (vibe === "Bold") {
    bonus += (p.intScore || 0) * 0.4;
    if (tags.has("oud") || tags.has("leather") || tags.has("smoky") || tags.has("incense")) bonus += 2;
  } else if (vibe === "Soft") {
    if (tags.has("musk") || tags.has("powdery") || tags.has("floral") || tags.has("iris") || tags.has("violet")) bonus += 3;
    if ((p.intScore || 0) > 8) bonus -= 2;
  } else if (vibe === "Energizing") {
    if (tags.has("citrus") || tags.has("grapefruit") || tags.has("bergamot") || tags.has("mint") ||
        tags.has("cardamom") || tags.has("pepper")) bonus += 3;
    if (p.mood === "Air") bonus += 1;
  }

  return bonus;
}

function WearTodayView({ onSelect, wearStats, perfumes }) {
  const [season, setSeason] = useState(() => {
    const m = new Date().getMonth();
    if (m >= 2 && m <= 4) return "Spring";
    if (m >= 5 && m <= 7) return "Summer";
    if (m >= 8 && m <= 10) return "Autumn";
    return "Winter";
  });
  const [occasion, setOccasion] = useState("Casual");
  const [vibe, setVibe] = useState("Fresh");

  const enriched = useMemo(() => enrich(perfumes, wearStats), [wearStats, perfumes]);

  const ranked = useMemo(() => {
    const ctx = { season, occasion, vibe };
    return enriched
      .filter(p => p.status !== "Avoid" && p.status !== "Dislike" && p.preference !== "Dislike")
      .map(p => {
        const base = (p.balScore || 0);
        const ctxBonus = contextScore(p, ctx);
        const forgottenBonus = p.isForgottenLove ? 3 : 0;
        const overwornPenalty = p.isOverworn ? -5 : 0;
        const lovePref = p.preference === "Love" ? 2 : 0;
        const total = base + ctxBonus + forgottenBonus + overwornPenalty + lovePref;
        return { ...p, todayScore: total, ctxBonus };
      })
      .sort((a, b) => b.todayScore - a.todayScore)
      .slice(0, 12);
  }, [enriched, season, occasion, vibe]);

  const top = ranked[0];

  return <div>
    <h1 className="page-title">What to Wear Today</h1>
    <p className="page-sub">Tell me the context — I'll rank your collection for right now.</p>

    <div className="context-group">
      <div className="context-group-label">Season</div>
      <div className="context-chips">
        {SEASONS.map(s => <button key={s} className={`ctx-chip ${season === s ? "active" : ""}`} onClick={() => setSeason(s)}>{s}</button>)}
      </div>
    </div>

    <div className="context-group">
      <div className="context-group-label">Occasion</div>
      <div className="context-chips">
        {OCCASIONS.map(o => <button key={o} className={`ctx-chip ${occasion === o ? "active" : ""}`} onClick={() => setOccasion(o)}>{o}</button>)}
      </div>
    </div>

    <div className="context-group" style={{marginBottom: 28}}>
      <div className="context-group-label">Vibe</div>
      <div className="context-chips">
        {VIBES.map(v => <button key={v} className={`ctx-chip ${vibe === v ? "active" : ""}`} onClick={() => setVibe(v)}>{v}</button>)}
      </div>
    </div>

    {top && (
      <div className="surprise-card" style={{marginBottom: 28}}>
        <div className="surprise-label">Top Pick for {season} · {occasion} · {vibe}</div>
        <div className="surprise-house">{top.house}</div>
        <div className="surprise-name">{top.name}</div>
        {top.concentration && <div className="surprise-conc">{top.concentration}</div>}
        <div className="tag-row centered" style={{justifyContent:"center",marginBottom:8}}>
          {(top.tags || []).slice(0,5).map(t => <Tag key={t} tag={t} />)}
        </div>
        {top.myNotes && <div className="surprise-quote">{top.myNotes}</div>}
        <div className="surprise-rating" style={{color:"var(--gold)"}}>
          {top.rating != null ? `${top.rating}/10` : ""}
          {top.isForgottenLove && " · ↩ Forgotten Love"}
        </div>
        <div className="surprise-actions">
          <button className="btn-primary" onClick={() => onSelect(top)}>Details</button>
        </div>
      </div>
    )}

    <div className="result-count">{ranked.length} ranked for your context</div>
    <div className="grid">
      {ranked.map((p, i) => {
        let annotation = null;
        if (i === 0) annotation = `✦ Today's Pick`;
        else if (p.isForgottenLove) annotation = "↩ Forgotten Love";
        else if (p.ctxBonus >= 5) annotation = "Great fit";
        return <Card key={p.id} p={p} onClick={onSelect} annotation={annotation} />;
      })}
    </div>
  </div>;
}

function App() {
  useEffect(() => {
    if (CONFIG.accentColor) document.documentElement.style.setProperty("--gold", CONFIG.accentColor);
    if (CONFIG.appTitle) document.title = CONFIG.appTitle;
  }, []);
  const [view, setView] = useState("pick");
  const [selected, setSelected] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [wearLog, setWearLog] = useState(WEAR_LOG_SEED);
  const [wishlist, setWishlist] = useState(WISHLIST_SEED);
  const [userPerfumes, setUserPerfumes] = useState([]);
  const [perfumeEdits, setPerfumeEdits] = useState({});
  const perfumes = useMemo(() => {
    const base = [...PERFUMES_SEED, ...userPerfumes.map(normalizePerfume)];
    const withEdits = base.map(p => {
      const ed = perfumeEdits[p.id];
      return ed ? { ...p, ...ed } : p;
    });
    const stats = computeWearStats(wearLog);
    return enrich(withEdits, stats);
  }, [userPerfumes, perfumeEdits, wearLog]);
  const [syncStatus, setSyncStatus] = useState("Local storage");
  const [loaded, setLoaded] = useState(false);

  const loadAll = useCallback(async () => {
    if (cloudConfigured()) {
      const data = await cloudLoad();
      if (data) {
        // For keys missing from cloud, fall back to localStorage rather than defaulting to empty
        const localEdits = (() => { try { return JSON.parse(localStorage.getItem("perfume_edits") || "{}"); } catch(e) { return {}; } })();
        const localPerfumes = (() => { try { return JSON.parse(localStorage.getItem("perfume_user_perfumes") || "[]"); } catch(e) { return []; } })();
        const localWishlist = (() => { try { return JSON.parse(localStorage.getItem("perfume_wishlist") || "[]"); } catch(e) { return []; } })();
        setWearLog([...WEAR_LOG_SEED, ...(data.wearLog || []).map(normalizeWearEntry)]);
        setWishlist([...WISHLIST_SEED, ...(data.wishlist || localWishlist)]);
        setUserPerfumes(data.userPerfumes && data.userPerfumes.length ? data.userPerfumes : localPerfumes);
        setPerfumeEdits(data.perfumeEdits && Object.keys(data.perfumeEdits).length ? data.perfumeEdits : localEdits);
        setSyncStatus("✓ Synced");
        setLoaded(true); return;
      }
      setSyncStatus("⚠ Cloud unreachable · loading local backup");
    } else {
      setSyncStatus("Local · set up sync in Settings");
    }
    try {
      const d = JSON.parse(localStorage.getItem("perfume_diary") || "[]");
      const w = JSON.parse(localStorage.getItem("perfume_wishlist") || "[]");
      const p = JSON.parse(localStorage.getItem("perfume_user_perfumes") || "[]");
      const ed = JSON.parse(localStorage.getItem("perfume_edits") || "{}");
      setWearLog([...WEAR_LOG_SEED, ...d.map(normalizeWearEntry)]);
      setWishlist([...WISHLIST_SEED, ...w]);
      setUserPerfumes(p);
      setPerfumeEdits(ed);
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  const addWearEntry = useCallback((entry) => {
    const matched = attachPerfumeIdToEntry(entry, perfumes);
    setWearLog(prev => {
      const next = [...prev, matched];
      const user = next.filter(e => !WEAR_LOG_SEED.includes(e));
      try { localStorage.setItem("perfume_diary", JSON.stringify(user)); } catch (e) {}
      cloudSync("add_wear", matched);
      return next;
    });
  }, [perfumes]);

  const editWearEntry = useCallback((oldEntry, newEntry) => {
    setWearLog(prev => {
      const idx = prev.indexOf(oldEntry);
      if (idx === -1) return prev;
      const next = [...prev];
      next[idx] = newEntry;
      const user = next.filter(e => !WEAR_LOG_SEED.includes(e));
      try { localStorage.setItem("perfume_diary", JSON.stringify(user)); } catch (e) {}
      cloudSync("edit_wear", newEntry);
      return next;
    });
  }, []);

  const deleteWearEntry = useCallback((entry) => {
    setWearLog(prev => {
      const next = prev.filter(e => e !== entry);
      const user = next.filter(e => !WEAR_LOG_SEED.includes(e));
      try { localStorage.setItem("perfume_diary", JSON.stringify(user)); } catch (e) {}
      cloudSync("delete_wear", null);
      return next;
    });
  }, []);

  const editPerfume = useCallback((id, updates) => {
    setPerfumeEdits(prev => {
      const next = { ...prev, [id]: { ...(prev[id] || {}), ...updates } };
      try { localStorage.setItem("perfume_edits", JSON.stringify(next)); } catch (e) {}
      cloudSync("edit_perfume", { id, updates });
      return next;
    });
  }, []);

  const addWishlistItem = useCallback((item) => {
    setWishlist(prev => {
      const next = [...prev, item];
      const user = next.filter(w => !WISHLIST_SEED.includes(w));
      try { localStorage.setItem("perfume_wishlist", JSON.stringify(user)); } catch (e) {}
      cloudSync("add_wishlist", item);
      return next;
    });
  }, []);

  const addPerfume = useCallback((compactPerfume) => {
    setUserPerfumes(prev => {
      const next = [...prev, compactPerfume];
      try { localStorage.setItem("perfume_user_perfumes", JSON.stringify(next)); } catch (e) {}
      cloudSync("add_perfume", compactPerfume);
      return next;
    });
  }, []);

  const removeWishlistItem = useCallback((idx) => {
    setWishlist(prev => {
      const next = prev.filter((_, i) => i !== idx);
      const user = next.filter(w => !WISHLIST_SEED.includes(w));
      try { localStorage.setItem("perfume_wishlist", JSON.stringify(user)); } catch (e) {}
      cloudSync("set_wishlist", user);
      return next;
    });
  }, []);

  const wearStats = useMemo(() => computeWearStats(wearLog), [wearLog]);

  const NAV = [
    { k: "today", l: "Wear Today" },
    { k: "pick", l: "Pick" },
    { k: "surprise", l: "Surprise" },
    { k: "collection", l: "Collection" },
    { k: "taxonomy", l: "Taxonomy" },
    { k: "similar", l: "Similar" },
    { k: "compare", l: "Compare" },
    { k: "diary", l: "Diary" },
    { k: "wishlist", l: "Wishlist" },
    { k: "add", l: "Add Perfume" },
    { k: "insights", l: "Insights" },
    { k: "settings", l: "Settings" },
  ];

  const go = (k) => { setView(k); setMenuOpen(false); };

  return <div className="app">
    <nav className="nav">
      <div className="nav-inner">
        <div className="logo" onClick={() => go("pick")}>{CONFIG.appTitle}</div>
        <button className="menu-btn" onClick={() => setMenuOpen(m => !m)} aria-label="Menu">
          {menuOpen ? "×" : "☰"}
        </button>
      </div>
      <div className={`nav-links ${menuOpen ? "open" : ""}`}>
        {NAV.map(({ k, l }) =>
          <button key={k} className={`nav-link ${view === k ? "active" : ""}`} onClick={() => go(k)}>{l}</button>
        )}
      </div>
    </nav>

    <main className="main">
      {!loaded && <div className="loading">Loading…</div>}
      {loaded && view === "today" && <WearTodayView onSelect={setSelected} wearStats={wearStats} perfumes={perfumes} />}
      {loaded && view === "pick" && <PickView onSelect={setSelected} wearStats={wearStats} perfumes={perfumes} />}
      {loaded && view === "surprise" && <SurpriseView onSelect={setSelected} perfumes={perfumes} />}
      {loaded && view === "collection" && <CollectionView onSelect={setSelected} wearStats={wearStats} perfumes={perfumes} />}
      {loaded && view === "compare" && <CompareView perfumes={perfumes} />}
      {loaded && view === "taxonomy" && <TaxonomyView onSelect={setSelected} perfumes={perfumes} />}
      {loaded && view === "similar" && <SimilarView onSelect={setSelected} perfumes={perfumes} />}
      {loaded && view === "diary" && <DiaryView wearLog={wearLog} onAdd={addWearEntry} onEdit={editWearEntry} onDelete={deleteWearEntry} syncStatus={syncStatus} />}
      {loaded && view === "wishlist" && <WishlistView wishlist={wishlist} onAdd={addWishlistItem} onRemove={removeWishlistItem} />}
      {loaded && view === "insights" && <InsightsView onSelect={setSelected} wearStats={wearStats} perfumes={perfumes} />}
      {loaded && view === "add" && <AddPerfumeView onAdd={addPerfume} perfumes={perfumes} />}
      {loaded && view === "settings" && <SettingsView syncStatus={syncStatus} onSyncChange={loadAll} />}
    </main>

    {selected && <Modal p={selected} onClose={() => setSelected(null)} onEdit={editPerfume} />}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
